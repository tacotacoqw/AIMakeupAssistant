<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 美妆助手</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FEF3C7;
            /* Apple Color Emoji 必须放在 PingFang SC 之前，否则中文字体会先尝试渲染 emoji 字形（没有 → 豆腐块） */
            font-family: -apple-system, 'Apple Color Emoji', 'PingFang SC', sans-serif;
            color: #1C1917;
            margin: 0;
            padding: 0;
            position: relative;
        }

        body::after {
            display: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #FFFBEB 0%, #FEF3C7 100%);
            position: relative;
        }

        /* Header */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 20px));
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(254,215,170,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 12px;
            color: #78716C;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34,197,94,0.1);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #16A34A;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22C55E;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        .location-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 14px;
            min-height: 44px;
            background: rgba(249,115,22,0.1);
            border: none;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 500;
            color: #C2410C; /* 加深一档，对深色背景对比更好 (WCAG AA) */
        }

        .location-btn:active {
            background: rgba(249,115,22,0.2);
            transform: scale(0.96);
        }

        /* Video */
        .video-section {
            flex-shrink: 0;
            padding: 12px 16px;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 20px;
            overflow: hidden;
            background: #1C1917;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            background: linear-gradient(135deg, #1C1917 0%, #292524 100%);
        }

        .video-placeholder svg {
            width: 72px;
            height: 72px;             /* 强制 1:1，跟 viewBox 24×24 一致，绝不会扁 */
            margin-bottom: 16px;
            opacity: 0.85;
            display: block;
        }
        /* 录制点呼吸效果，告诉用户"在加载中" */
        .video-placeholder svg .cam-led {
            animation: camLedPulse 1.4s ease-in-out infinite;
            transform-origin: 17.5px 9.5px;
        }
        @keyframes camLedPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.85); }
            50%      { opacity: 1.0; transform: scale(1.15); }
        }

        .video-placeholder p {
            font-size: 16px;
            font-weight: 500;
        }

        .video-placeholder small {
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.6;
        }

        .video-status {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: 500;
        }

        .camera-switch-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s;
        }
        .camera-switch-btn:active {
            background: rgba(0,0,0,0.8);
        }
        .camera-switch-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Chat */
        .chat-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 0;
        }

        .chat-messages::-webkit-scrollbar { display: none; }

        .message {
            margin-bottom: 10px;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-ai {
            background: white;
            border: 1px solid #FED7AA;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            margin-right: 40px;
            font-size: 15px;
            line-height: 1.5;
        }

        .msg-user {
            background: linear-gradient(135deg, #F97316, #EA580C);
            border-radius: 16px;
            border-bottom-right-radius: 4px;
            padding: 12px 16px;
            margin-left: 40px;
            font-size: 15px;
            line-height: 1.5;
            color: white;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #F97316;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Quick Actions */
        .quick-actions {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 8px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .quick-actions::-webkit-scrollbar { display: none; }

        .quick-btn {
            flex-shrink: 0;
            padding: 12px 18px;
            min-height: 44px;
            background: white;
            border: 1.5px solid #FED7AA;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 500;
            color: #1C1917;
            white-space: nowrap;
        }

        .quick-btn:active {
            background: #FFFBEB;
            border-color: #F97316;
            transform: scale(0.96);
        }

        /* Controls */
        .controls {
            flex-shrink: 0;
            background: #FEF3C7;
            border-top: none;
            padding: 8px 16px calc(env(safe-area-inset-bottom, 0px) + 8px) 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .text-input {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            background: #F5F5F4;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            color: #1C1917;
            outline: none;
        }

        .text-input::placeholder { color: #A8A29E; }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            border: none;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .send-btn:active { transform: scale(0.92); }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 48px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
        }

        .action-btn:active { transform: scale(0.96); }

        .action-btn.primary {
            background: linear-gradient(135deg, #F97316, #EA580C);
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.3);
        }

        .action-btn.secondary {
            background: #FFFBEB;
            border: 2px solid #FED7AA;
            color: #1C1917;
        }

        /* Voice Waves */
        .voice-waves {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .voice-waves span {
            width: 3px;
            height: 12px;
            background: white;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        .voice-waves span:nth-child(1) { animation-delay: 0s; }
        .voice-waves span:nth-child(2) { animation-delay: 0.1s; }
        .voice-waves span:nth-child(3) { animation-delay: 0.2s; }
        .voice-waves span:nth-child(4) { animation-delay: 0.3s; }
        .voice-waves span:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        .action-btn.listening {
            background: linear-gradient(135deg, #EF4444, #DC2626) !important;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .action-btn.call-mode {
            background: linear-gradient(135deg, #22C55E, #16A34A) !important;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.3);
        }

        .action-btn.call-mode.listening {
            background: linear-gradient(135deg, #EF4444, #DC2626) !important;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ===== 全屏通话界面 ===== */
        .call-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
            overflow: hidden;
        }
        .call-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 摄像头画面作为通话背景 */
        .call-video-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        /* 通话页人脸检测虚线框层：盖在视频上方、UI 下方 */
        .call-face-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        /* 右上角摄像头切换按钮 */
        .call-camera-switch {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 10px);
            right: 16px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .call-camera-switch:active { background: rgba(255,255,255,0.4); }
        .call-video-mask {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(0,0,0,0.5) 0%,
                rgba(0,0,0,0.2) 30%,
                rgba(0,0,0,0.2) 60%,
                rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* 顶部区域 */
        .call-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 16px;
            z-index: 2;
        }
        .call-timer {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .call-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* 中间区域：头像 + 状态 */
        .call-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 2;
        }

        /* 头像容器（带呼吸光圈） */
        .call-avatar-wrap {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .call-avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(249,115,22,0.4);
            animation: callBreath 3s ease-in-out infinite;
        }
        .call-avatar-ring2 {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            border: 1.5px solid rgba(249,115,22,0.2);
            animation: callBreath 3s ease-in-out infinite 0.5s;
        }
        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F97316, #FB923C);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(249,115,22,0.3);
        }
        .call-avatar svg {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
        }

        @keyframes callBreath {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* ===== 通话连接中的加载状态 ===== */
        .call-center.connecting .call-avatar {
            opacity: 0.55;
            transition: opacity 0.3s;
        }
        .call-center.connecting .call-avatar-wrap::before {
            content: '';
            position: absolute;
            inset: -22px;
            border-radius: 50%;
            border: 3px solid rgba(249,115,22,0.18);
            border-top-color: #F97316;
            animation: callSpin 0.9s linear infinite;
            pointer-events: none;
        }
        .call-center.connecting .call-avatar-ring,
        .call-center.connecting .call-avatar-ring2 {
            animation-play-state: paused;
            opacity: 0;
        }
        @keyframes callSpin {
            to { transform: rotate(360deg); }
        }

        /* AI名字 */
        .call-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        /* 状态文字 */
        .call-status {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            min-height: 20px;
            text-align: center;
            max-width: 280px;
            line-height: 1.4;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* 语音波形条 */
        .call-voice-bars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 36px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .call-voice-bars.active {
            opacity: 1;
        }
        .call-voice-bars span {
            width: 4px;
            border-radius: 3px;
            background: rgba(249,115,22,0.8);
            transition: height 0.15s ease;
        }
        .call-voice-bars.listening span {
            background: rgba(34,197,94,0.8);
        }

        /* 字幕区域 */
        .call-subtitle-area {
            position: absolute;
            bottom: 160px;
            left: 20px;
            right: 20px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .call-subtitle {
            padding: 10px 18px;
            border-radius: 16px;
            font-size: 16px;
            line-height: 1.6;
            max-width: 92%;
            text-align: center;
            min-height: 24px;
            word-break: break-word;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .call-subtitle.ai {
            background: rgba(249,115,22,0.2);
            border: 1px solid rgba(249,115,22,0.3);
            color: #fff;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .call-subtitle.user {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .call-subtitle-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2px;
        }
        .call-subtitle .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: rgba(255,255,255,0.7);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 通话界面任务清单 */
        .call-task-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 12px;
            z-index: 4;
            max-width: 200px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .call-task-container:empty { display: none; }
        .call-task-container .task-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 10px 12px;
            margin-top: 50px;
        }
        .call-task-container .task-card-header {
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .call-task-container .task-card-title {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
        }
        .call-task-container .task-progress {
            color: rgba(249,115,22,0.9);
            font-size: 12px;
        }
        .call-task-container .task-progress-bar {
            background: rgba(255,255,255,0.1);
        }
        .call-task-container .task-name {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
        }
        .call-task-container .task-name.done {
            color: rgba(255,255,255,0.4);
        }
        .call-task-container .task-desc {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
        }
        .call-task-container .task-check {
            border-color: rgba(255,255,255,0.3);
        }
        .call-task-container .task-check.done {
            background: #22C55E;
            border-color: #22C55E;
        }
        .call-task-container .task-check.active {
            border-color: #F97316;
        }
        .call-task-container .task-done-btn {
            font-size: 10px;
            padding: 2px 10px;
        }
        .call-task-container .task-step-num {
            color: rgba(255,255,255,0.5);
        }
        .call-task-container .task-step-num.done {
            color: rgba(255,255,255,0.3);
        }
        .call-task-container .task-item {
            padding: 4px 0;
        }
        .call-task-container .task-complete-banner {
            color: rgba(255,255,255,0.9);
            font-size: 12px;
        }

        /* 底部按钮区 */
        .call-bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding-bottom: 20px;
            z-index: 2;
        }
        .call-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .call-action-btn .btn-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .call-action-btn:active .btn-circle {
            transform: scale(0.92);
        }
        .call-action-btn .btn-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .call-hangup .btn-circle {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        }
        .call-mute .btn-circle {
            background: rgba(255,255,255,0.15);
        }
        .call-mute.muted .btn-circle {
            background: rgba(239,68,68,0.3);
        }
        .call-speaker .btn-circle {
            background: rgba(255,255,255,0.15);
        }

        /* 静音 / 免提按钮的 on/off 图标切换 */
        .call-action-btn .icon-off { display: none; }
        .call-mute.muted .icon-on { display: none; }
        .call-mute.muted .icon-off { display: block; }
        .call-speaker.earpiece .icon-on { display: none; }
        .call-speaker.earpiece .icon-off { display: block; }

        .hidden { display: none !important; }

        /* ===== 无障碍 (Accessibility) ===== */

        /* 屏幕阅读器专属文字：视觉隐藏但 VoiceOver 仍能读 */

            position: absolute !important;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            white-space: nowrap; border: 0;

        /* 键盘焦点高亮 — 用户用键盘 / 外接设备能看清焦点 */
        button:focus-visible,
        select:focus-visible,
        input:focus-visible,
        [tabindex]:focus-visible {
            outline: 3px solid #F97316;
            outline-offset: 2px;
        }

        /* 用户系统开启"减弱动画"时关掉非必要动画 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

    <script>

        // 化妆品店铺数据（示例数据，按城市常见连锁店）
        const COSMETIC_STORES = [
            { id: 's1', name: '丝芙兰 SEPHORA', address: '市中心商业广场1层', lat: 0, lng: 0, tags: ['国际品牌', '彩妆', '护肤'] },
            { id: 's2', name: '屈臣氏 Watsons', address: '万达广场B1层', lat: 0, lng: 0, tags: ['日用', '护肤', '平价'] },
            { id: 's3', name: 'THE COLORIST 调色师', address: '大悦城2层L205', lat: 0, lng: 0, tags: ['潮流彩妆', '网红'] },
            { id: 's4', name: '完美日记体验店', address: '太古里北街18号', lat: 0, lng: 0, tags: ['国货', '彩妆'] },
            { id: 's5', name: '妍丽 COSMO', address: '银泰百货3层', lat: 0, lng: 0, tags: ['高端护肤', '进口'] },
            { id: 's6', name: '名创优品美妆区', address: '步行街中段88号', lat: 0, lng: 0, tags: ['平价', '日用'] },
            { id: 's7', name: 'WOW COLOUR', address: '龙湖天街1层', lat: 0, lng: 0, tags: ['潮流', '彩妆集合'] },
            { id: 's8', name: '植村秀专柜', address: 'SKP百货1层', lat: 0, lng: 0, tags: ['高端彩妆', '卸妆油'] },
        ];

        const $ = id => document.getElementById(id);
        let stream = null;
        let listening = false;
        let processing = false;
        let voiceEnabled = true;
        let history = [];
        let userLat = null;
        let userLng = null;
        let storePanelOpen = false;
        let settingsPanelOpen = false;
        let aiEnabled = true; // 内置默认 API Key，开箱即用
        let aiCallbacks = {}; // 请求ID -> {resolve, reject} 的映射
        let aiCallIdCounter = 0;
        let callMode = false; // 通话模式：像打电话一样连续对话
        let speaking = false; // TTS是否正在播报
        const PRIVACY_CONSENT_KEY = 'vision_upload_consent';
        let visionConsentGranted = localStorage.getItem(PRIVACY_CONSENT_KEY) === '1';

        // 摄像头方向：'user' = 前置，'environment' = 后置
        let currentFacingMode = 'user';
        let cameraSwitching = false;

        // 初始化摄像头（带重试，WKWebView权限可能需要时间）
        async function initCamera(retries) {
            retries = retries || 0;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                $('placeholder').querySelector('p').textContent = '摄像头API不可用';
                $('placeholder').querySelector('small').textContent = '请确保使用真机运行';
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                $('camera').srcObject = stream;
                await $('camera').play();
                $('placeholder').classList.add('hidden');
                // 不镜像，直接显示原始画面
                $('camera').style.transform = 'none';
                $('faceCanvas').style.transform = 'none';
                // 同步到通话界面背景
                if (callMode) syncCallVideo();
                // 摄像头就绪后初始化人脸网格检测
                initFaceMesh();
            } catch (e) {
                if (retries < 3) {
                    // 重试，每次间隔递增
                    setTimeout(() => initCamera(retries + 1), 1000 * (retries + 1));
                } else {
                    $('placeholder').querySelector('p').textContent = '无法访问摄像头';
                    $('placeholder').querySelector('small').textContent = e.message || '请检查权限设置';
                }
            }
        }

        // 切换前后摄像头
        async function switchCamera() {
            if (cameraSwitching) return;
            cameraSwitching = true;

            // 停止人脸检测
            stopNativeFaceDetection();

            // 停止当前摄像头流
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            // 切换方向
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';

            // 重新初始化摄像头
            await initCamera();
            cameraSwitching = false;
        }

        // 截取画面（高清版用于视觉检测）
        function captureFrame(highRes) {
            if (!stream) return null;
            const canvas = document.createElement('canvas');
            const w = highRes ? 640 : 320;
            const h = highRes ? 480 : 240;
            const q = highRes ? 0.85 : 0.6;
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage($('camera'), 0, 0, w, h);
            return canvas.toDataURL('image/jpeg', q).split(',')[1];
        }

        function ensureVisionConsent() {
            if (visionConsentGranted) return true;
            const ok = window.confirm('拍照分析需要上传当前画面到AI服务进行处理。是否同意？');
            if (ok) {
                visionConsentGranted = true;
                localStorage.setItem(PRIVACY_CONSENT_KEY, '1');
            }
            return ok;
        }

        // =====================================================
        // 原生语音识别桥接（替代 Web Speech API）
        // =====================================================

        // 从 Swift 原生调用的回调函数
        window.nativeSpeechStarted = function() {
            listening = true;
            // 通话模式下不切换按钮图标/动画，保持按钮稳定不抖动
            if (!callMode) {
                $('voiceIcon').classList.add('hidden');
                $('voiceWave').classList.remove('hidden');
                $('voiceBtn').classList.add('listening');
            }
            // 通话模式下不在录音开始时打断TTS，只在检测到用户实际说话时打断（见 nativeSpeechPartial）
            $('aiStatus').textContent = callMode ? '正在听你说...' : '正在听...';
            if (callMode && !speaking) updateCallOverlayStatus('正在听你说...');
        };

        // 实时显示语音识别的部分结果
        let lastPartialUpdate = 0;
        let _nativeSilenceTimer = null; // 原生识别静默计时器
        let _lastPartialText = '';      // 最后一次 partial 文本
        const NATIVE_SILENCE_TIMEOUT = 1500; // 1.5秒无新partial则停止录音，强制出final结果

        window.nativeSpeechPartial = function(text) {
            const now = Date.now();
            if (now - lastPartialUpdate < 200) return;
            lastPartialUpdate = now;
            if (text && text.trim()) {
                const t = text.trim();
                // Whisper 状态提示只显示在状态栏，不显示为字幕
                if (t === '识别中...' || t === '正在听...' || t === '超时，正在识别...') {
                    $('aiStatus').textContent = t;
                    if (callMode) updateCallOverlayStatus(t);
                    return;
                }
                $('aiStatus').textContent = text;
                if (callMode) showCallSubtitle(text, 'user');
                _lastPartialText = text.trim();
                // 通话模式下：收到partial后启动静默计时器
                // 如果2秒内没有新partial或final，手动停止录音强制出结果
                if (callMode && !processing) {
                    if (_nativeSilenceTimer) clearTimeout(_nativeSilenceTimer);
                    _nativeSilenceTimer = setTimeout(() => {
                        _nativeSilenceTimer = null;
                        if (callMode && listening && !processing && !speaking && _lastPartialText) {
                            // 强制停止录音，触发 SFSpeechRecognizer 输出 isFinal=true
                            stopListening();
                        }
                    }, NATIVE_SILENCE_TIMEOUT);
                }
            }
        };

        window.nativeSpeechResult = function(text) {
            console.log('[语音识别] nativeSpeechResult 被调用，文本:', text);
            // 清除静默计时器
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();

            // 强制更新状态显示
            $('aiStatus').textContent = callMode ? '小美正在思考...' : '准备就绪';

            if (text && text.trim()) {
                // 显示用户说话的字幕
                if (callMode) showCallSubtitle(text.trim(), 'user');
                handleInput(text.trim());
            }
        };

        window.nativeSpeechEnded = function() {
            console.log('[语音识别] nativeSpeechEnded 被调用');
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            const hadText = _lastPartialText && _lastPartialText.trim();
            console.log('[语音识别] hadText:', hadText, 'callMode:', callMode);
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();

            // 强制更新状态显示
            $('aiStatus').textContent = callMode ? '小美正在思考...' : '准备就绪';

            // 通话模式下：只有在没识别到内容时才自动重新开始听
            // 如果识别到了内容，等AI回复完再开始听
            if (callMode && !hadText && !processing && !speaking && !_streamTTSActive) {
                console.log('[语音识别] 通话模式：没有识别到内容，300ms后重新开始监听');
                setTimeout(() => {
                    if (callMode && !listening && !processing && !speaking && !_streamTTSActive) {
                        startListening();
                    }
                }, 300);
            } else if (callMode && hadText) {
                console.log('[语音识别] 通话模式：识别到内容，等待AI处理');
            }
        };

        window.nativeSpeechError = function(error) {
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();
            // 通话模式下自动重试（除非正在播报）
            if (callMode && !processing && !speaking) {
                setTimeout(() => {
                    if (callMode && !listening && !processing && !speaking) {
                        startListening();
                    }
                }, 1000);
            }
        };

        function resetVoiceUI() {
            // 通话模式下不切换按钮图标，保持稳定
            if (!callMode) {
                $('voiceIcon').classList.remove('hidden');
                $('voiceWave').classList.add('hidden');
                $('voiceBtn').classList.remove('listening');
                $('aiStatus').textContent = '准备就绪';
            }
        }

        // 开始录音的统一入口（带节流，防止快速循环导致界面乱动）
        let lastListenTime = 0;
        function startListening() {
            const now = Date.now();
            const minInterval = callMode ? 500 : 1500;
            if (now - lastListenTime < minInterval) return;
            if (listening || processing) return;
            // TTS播放时不开麦克风，避免回声触发误打断
            if (speaking || _streamTTSActive) return;
            lastListenTime = now;
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.startVoice) {
                window.webkit.messageHandlers.startVoice.postMessage({});
            }
        }

        // 停止录音
        function stopListening() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopVoice) {
                window.webkit.messageHandlers.stopVoice.postMessage({});
            }
        }

        // =====================================================
        // 通话模式：Web Speech API 持续识别（参考 test8.html）
        // continuous: true 保持持续识别，不会每句话都断开重连
        // interimResults: true 实时显示识别文字
        // 静默检测：2.5秒无新语音则处理积累文本
        // =====================================================
        let callRecognition = null;
        let callSilenceTimer = null;
        let callLastSoundTime = 0;
        let callInterimText = '';
        const CALL_SILENCE_TIMEOUT = 2500;
        let callRecogLastActivity = 0; // watchdog: 识别最后活跃时间

        function startCallModeRecognition() {
            if (callMuted) return;
            // 始终使用原生语音识别（Native SFSpeechRecognizer），
            // 避免 WKWebView 中 Web Speech API 在 Edge TTS 播放后
            // 因音频会话冲突导致识别失效
            if (!listening && !processing) {
                lastListenTime = 0; // 绕过节流
                startListening();
            }
        }

        function stopCallModeRecognition() {
            stopCallSilenceDetection();
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            if (listening) stopListening();
            callInterimText = '';
            listening = false;
        }

        function startCallSilenceDetection() {
            stopCallSilenceDetection();
            callSilenceTimer = setInterval(() => {
                if (!callMode) { stopCallSilenceDetection(); return; }
                if (processing) return;

                const elapsed = Date.now() - callLastSoundTime;
                if (elapsed >= CALL_SILENCE_TIMEOUT && callInterimText && callInterimText.length > 0) {
                    const text = callInterimText;
                    callInterimText = '';

                    // 停止当前识别（会在 onend 中自动重启）
                    if (callRecognition) {
                        try { callRecognition.stop(); } catch(e) {}
                    }

                    if (!processing) {
                        handleInput(text);
                    }
                }
            }, 500);
        }

        function stopCallSilenceDetection() {
            if (callSilenceTimer) {
                clearInterval(callSilenceTimer);
                callSilenceTimer = null;
            }
        }

        // 通话计时器
        let callTimerInterval = null;
        let callStartTime = 0;

        // 通话声波动画
        let callVoiceBarsInterval = null;

        function startCallTimer() {
            callStartTime = Date.now();
            $('callTimer').textContent = '00:00';
            callTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');

            const div = document.createElement('div');

        // ===== 通话 Earcon（声音提示）— iOS WKWebView 必须 user-gesture 内解锁 =====
        let _audioCtx = null;
        let _audioUnlocked = false;

        function _ensureAudioCtx() {
            if (!_audioCtx) {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return null;
                _audioCtx = new AC();
            }
            return _audioCtx;
        }

        // iOS 解锁：在任何 user gesture 里塞一次"空音"，AudioContext 之后就能自由播放
        function _unlockAudioOnce() {
            if (_audioUnlocked) return;
            const ctx = _ensureAudioCtx();
            if (!ctx) return;
            try {
                if (ctx.state === 'suspended') ctx.resume();
                const buf = ctx.createBuffer(1, 1, 22050);
                const src = ctx.createBufferSource();
                src.buffer = buf;
                src.connect(ctx.destination);
                src.start(0);
                _audioUnlocked = true;
                console.log('[Earcon] AudioContext 已解锁');
            } catch (e) {
                console.warn('[Earcon] 解锁失败:', e);
            }
        }
        // 任何用户首次触摸都触发解锁（一次性）
        document.addEventListener('touchstart', _unlockAudioOnce, { once: true, passive: true });
        document.addEventListener('click', _unlockAudioOnce, { once: true });

        function _playTone(freq, durationMs, startOffsetMs, volume) {
            try {
                const ctx = _ensureAudioCtx();
                if (!ctx) { console.warn('[Earcon] 无 AudioContext'); return; }
                if (ctx.state === 'suspended') ctx.resume();
                const start = ctx.currentTime + (startOffsetMs || 0) / 1000;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, start);
                osc.connect(gain).connect(ctx.destination);
                const v = volume == null ? 0.35 : volume; // 提高默认音量
                gain.gain.setValueAtTime(0.0001, start);
                gain.gain.exponentialRampToValueAtTime(v, start + 0.012);
                gain.gain.setValueAtTime(v, start + durationMs / 1000 - 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + durationMs / 1000);
                osc.start(start);
                osc.stop(start + durationMs / 1000 + 0.05);
            } catch (e) { console.warn('[Earcon] 播放失败:', e); }
        }
        // 优先调用原生 iOS earcon (AudioServicesPlaySystemSound)，绕开 Web Audio 限制；
        // 不可用时回退到 Web Audio 自合成的 tone。
        function _nativeEarcon(type) {
            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeEarcon) {
                    window.webkit.messageHandlers.nativeEarcon.postMessage(type);
                    return true;
                }
            } catch (e) {}
            return false;
        }
        function earconConnecting() { if (!_nativeEarcon('connecting')) _playTone(520, 180, 0); }
        function earconConnected()  { if (!_nativeEarcon('connected'))  { _playTone(660, 110, 0); _playTone(880, 170, 130); } }
        function earconHangup()     { if (!_nativeEarcon('hangup'))     { _playTone(660, 100, 0); _playTone(440, 200, 110); } }

        // 流式AI响应：边生成边显示 + 通话模式边生成边播报
        let _streamingDiv = null;
        let _streamingCallId = null;
        let _streamSentenceQueue = [];   // 待播报的句子队列
        let _streamSentenceBuffer = '';  // 当前积累的不完整句子
        let _streamTTSActive = false;    // 是否正在逐句播报
        let _streamingSpoke = false;     // 本次回复是否用了逐句播报

        let _streamingRawText = '';      // 累积原始文本（含标记）

        window.nativeAIChunk = function(chunk, callId) {
            console.log('[AI] 流式块接收，callId:', callId, '块长度:', chunk.length, '内容:', chunk.substring(0, 50));
            // 视觉：流式显示文字
            if (!_streamingDiv || _streamingCallId !== callId) {
                hideTyping();
                _streamingDiv = document.createElement('div');
                _streamingDiv.className = 'message msg-ai';
                _streamingDiv.textContent = '';
                _streamingCallId = callId;
                _streamingRawText = '';
                $('chat').appendChild(_streamingDiv);
            }
            _streamingRawText += chunk;
            // 显示时过滤掉 [CHECKLIST]...[/CHECKLIST]、[DONE:n]、[ALLDONE] 标记
            _streamingDiv.textContent = _streamingRawText
                .replace(/\[CHECKLIST\][\s\S]*?(\[\/CHECKLIST\]|$)/g, '')
                .replace(/\[DONE:\d+\]/g, '')
                .replace(/\[ALLDONE\]/g, '')
                .trim();
            $('chat').scrollTop = $('chat').scrollHeight;

            // 逐句播报：检测句子边界，边输出边说话（语音播报启用时）
            if (voiceEnabled) {
                // 检测到任务清单标记时，跳过流式播报（让 processTaskMarkers 统一处理）
                if (_streamingRawText.includes('[CHECKLIST]')) {
                    return;
                }
                _streamSentenceBuffer += chunk;
                // 在中英文句号/叹号/问号处断句，让句子更完整流畅
                const re = /[。！？.!?]/;
                let match;
                while ((match = re.exec(_streamSentenceBuffer)) !== null) {
                    const sentence = _streamSentenceBuffer.substring(0, match.index + 1).trim();
                    _streamSentenceBuffer = _streamSentenceBuffer.substring(match.index + 1);
                    if (sentence && sentence.length > 1) {
                        _streamSentenceQueue.push(sentence);
                    }
                }
                // 只要有1句话就立即播报，减少等待时间
                if (_streamSentenceQueue.length >= 1 && !_streamTTSActive) {
                    _streamingSpoke = true;
                    _speakNextStream();
                }
            }
        };

        function _speakNextStream() {
            if (_streamSentenceQueue.length === 0) {
                _streamTTSActive = false;
                return;
            }
            _streamTTSActive = true;
            speaking = true;
            // 首句立即播报，减少等待时间（短句也允许，不再等到攒满 30 字）
            let combinedText = _streamSentenceQueue.shift();
            // 只在已有多句缓存时才略微合并，避免单句太短到 TTS 报错
            while (_streamSentenceQueue.length > 0 && combinedText.length < 12) {
                combinedText += _streamSentenceQueue.shift();
            }
            if (callMode) {
                showCallSubtitle(combinedText, 'ai');
                updateCallOverlayStatus('小美正在说...');
                $('aiStatus').textContent = '小美正在说...';
            }
            if (_speakSafety) clearTimeout(_speakSafety);
            _speakSafety = setTimeout(() => {
                if (speaking || _streamTTSActive) {
                    // 超时：停止当前句子，跳到下一句（不清空整个队列）
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopSpeak) {
                        window.webkit.messageHandlers.stopSpeak.postMessage({});
                    }
                    if (_streamSentenceQueue.length > 0) {
                        _speakNextStream();
                    } else {
                        _streamTTSActive = false;
                        speaking = false;
                        if (callMode && !listening && !processing) {
                            setTimeout(() => {
                                if (callMode && !listening && !processing && !speaking) {
                                    startCallModeRecognition();
                                }
                            }, 500);
                        }
                    }
                }
            }, 12000);
            // 清理符号
            const cleanText = cleanTextForSpeech(combinedText);
            console.log('[TTS] 原文:', combinedText.substring(0, 50), '清理后:', cleanText.substring(0, 50));
            // 如果清理后文本太短或为空，跳过播报，继续下一句
            if (!cleanText || cleanText.length < 2) {
                console.log('[TTS] 文本太短，跳过:', cleanText);
                if (_streamSentenceQueue.length > 0) {
                    _speakNextStream();
                } else {
                    _streamTTSActive = false;
                    speaking = false;
                }
                return;
            }
            console.log('[TTS] 发送播报请求，剩余队列:', _streamSentenceQueue.length);
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeSpeak) {
                window.webkit.messageHandlers.nativeSpeak.postMessage({ text: cleanText, rate: 0.52, pitch: 1.1 });
            }
        }

        function _flushStreamBuffer() {
            if (_streamSentenceBuffer.trim()) {
                _streamSentenceQueue.push(_streamSentenceBuffer.trim());
                _streamSentenceBuffer = '';
            }
            if (!_streamTTSActive && _streamSentenceQueue.length > 0) {
                _streamingSpoke = true;
                _speakNextStream();
            }
        }

        function _clearStreamQueue() {

        // 在用户位置附近随机生成店铺坐标（演示用）
        function randomizeStoresAround(lat, lng) {
            COSMETIC_STORES.forEach((store, i) => {
                // 在 0.5~5km 范围内随机分布
                const angle = (i / COSMETIC_STORES.length) * Math.PI * 2;
                const dist = 0.005 + Math.random() * 0.04; // ~0.5km to ~4.5km
                store.lat = lat + dist * Math.cos(angle);

        function formatDistance(meters) {
            if (meters < 1000) {
                return Math.round(meters) + 'm';
            }
            return (meters / 1000).toFixed(1) + 'km';
        }

        function calcDistance(lat1, lng1, lat2, lng2) {
            // Haversine 公式
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getStoreDistanceText(store) {
            if (userLat === null || userLng === null || store.lat === 0) return '定位中...';
            const dist = calcDistance(userLat, userLng, store.lat, store.lng);
            return formatDistance(dist);
        }

        // 清理文本中的符号，为盲人用户保留清晰的停顿
        function cleanTextForSpeech(text) {
            return text
                // 移除 emoji 表情符号（不读出来）
                .replace(/[\u{1F600}-\u{1F64F}]/gu, '') // 表情符号
                .replace(/[\u{1F300}-\u{1F5FF}]/gu, '') // 符号和象形文字
                .replace(/[\u{1F680}-\u{1F6FF}]/gu, '') // 交通和地图符号
                .replace(/[\u{1F700}-\u{1F77F}]/gu, '') // 炼金术符号
                .replace(/[\u{1F780}-\u{1F7FF}]/gu, '') // 几何形状扩展
                .replace(/[\u{1F800}-\u{1F8FF}]/gu, '') // 补充箭头-C
                .replace(/[\u{1F900}-\u{1F9FF}]/gu, '') // 补充符号和象形文字
                .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '') // 扩展-A
                .replace(/[\u{1FA70}-\u{1FAFF}]/gu, '') // 符号和象形文字扩展-A
                .replace(/[\u{2600}-\u{26FF}]/gu, '')   // 杂项符号
                .replace(/[\u{2700}-\u{27BF}]/gu, '')   // 装饰符号
                .replace(/[\u{FE00}-\u{FE0F}]/gu, '')   // 变体选择器
                .replace(/[\u{1F1E0}-\u{1F1FF}]/gu, '') // 旗帜
                // 特殊符号替换为逗号（产生明显停顿）
                .replace(/[*#\-_~`\[\]{}()（）【】《》<>@$%^&+=|\\\/'"\"]/g, '，')
                // 句末标点统一为句号（产生长停顿）
                .replace(/[。！？.!?]/g, '。')
                // 其他标点统一为逗号（产生短停顿）
                .replace(/[，、；：,.;:]/g, '，')
                // 合并多个逗号
                .replace(/，+/g, '，')
                // 合并多个句号
                .replace(/。+/g, '。')
                // 移除多余空格
                .replace(/\s+/g, ' ')
                .trim();
        }

        // 语音播报（使用原生 AVSpeechSynthesizer）

        function speak(text) {
            // 通话模式始终显示AI字幕（不管语音开关）

            if (_speakSafety) clearTimeout(_speakSafety);
            _speakSafety = setTimeout(() => {
                if (speaking) {
                    speaking = false;
                    if (callMode && !listening && !processing) {
                        startCallModeRecognition();

            }, 30000);
            // 清理符号
            const cleanText = cleanTextForSpeech(text);
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeSpeak) {
                window.webkit.messageHandlers.nativeSpeak.postMessage({ text: cleanText, rate: 0.52, pitch: 1.1 });
            } else if (window.speechSynthesis) {
                // 浏览器回退
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(cleanText);
                u.lang = 'zh-CN';
                u.rate = 0.9;
                u.pitch = 1.1;
                u.onend = () => { speaking = false; window.nativeTTSEnded(); };
                window.speechSynthesis.speak(u);

        // 解析 AI 回复中的 [CHECKLIST]...[/CHECKLIST]
        function parseChecklist(text) {
            const match = text.match(/\[CHECKLIST\]([\s\S]*?)\[\/CHECKLIST\]/);
            if (!match) return null;
            const lines = match[1].trim().split('\n').filter(l => l.trim());
            return lines.map(line => {
                const parts = line.trim().split('|');
                return { name: parts[0].trim(), desc: parts[1] ? parts[1].trim() : '', done: false };
            });
        }

        // 解析 [DONE:n] 标记
        function parseDoneMarkers(text) {
            const markers = [];
            const regex = /\[DONE:(\d+)\]/g;
            let m;
            while ((m = regex.exec(text)) !== null) {
                markers.push(parseInt(m[1]));
            }
            return markers;
