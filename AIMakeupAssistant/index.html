<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 美妆助手</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FEF3C7;
            font-family: -apple-system, 'PingFang SC', sans-serif;
            color: #1C1917;
            margin: 0;
            padding: 0;
            position: relative;
        }

        body::after {
            display: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #FFFBEB 0%, #FEF3C7 100%);
            position: relative;
        }

        /* Header */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 20px));
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(254,215,170,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 12px;
            color: #78716C;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(34,197,94,0.1);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #16A34A;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22C55E;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        .location-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: rgba(249,115,22,0.1);
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #EA580C;
        }

        .location-btn:active {
            background: rgba(249,115,22,0.2);
            transform: scale(0.96);
        }

        /* Video */
        .video-section {
            flex-shrink: 0;
            padding: 12px 16px;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 20px;
            overflow: hidden;
            background: #1C1917;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            background: linear-gradient(135deg, #1C1917 0%, #292524 100%);
        }

        .video-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .video-placeholder p {
            font-size: 16px;
            font-weight: 500;
        }

        .video-placeholder small {
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.6;
        }

        .video-status {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: 500;
        }

        .camera-switch-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s;
        }
        .camera-switch-btn:active {
            background: rgba(0,0,0,0.8);
        }
        .camera-switch-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Chat */
        .chat-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 0;
        }

        .chat-messages::-webkit-scrollbar { display: none; }

        .message {
            margin-bottom: 10px;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-ai {
            background: white;
            border: 1px solid #FED7AA;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            margin-right: 40px;
            font-size: 15px;
            line-height: 1.5;
        }

        .msg-user {
            background: linear-gradient(135deg, #F97316, #EA580C);
            border-radius: 16px;
            border-bottom-right-radius: 4px;
            padding: 12px 16px;
            margin-left: 40px;
            font-size: 15px;
            line-height: 1.5;
            color: white;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #F97316;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Quick Actions */
        .quick-actions {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 8px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .quick-actions::-webkit-scrollbar { display: none; }

        .quick-btn {
            flex-shrink: 0;
            padding: 10px 16px;
            background: white;
            border: 1.5px solid #FED7AA;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #1C1917;
            white-space: nowrap;
        }

        .quick-btn:active {
            background: #FFFBEB;
            border-color: #F97316;
            transform: scale(0.96);
        }

        /* Controls */
        .controls {
            flex-shrink: 0;
            background: #FEF3C7;
            border-top: none;
            padding: 8px 16px calc(env(safe-area-inset-bottom, 0px) + 8px) 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .text-input {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            background: #F5F5F4;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            color: #1C1917;
            outline: none;
        }

        .text-input::placeholder { color: #A8A29E; }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #F97316, #EA580C);
            border: none;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .send-btn:active { transform: scale(0.92); }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 48px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
        }

        .action-btn:active { transform: scale(0.96); }

        .action-btn.primary {
            background: linear-gradient(135deg, #F97316, #EA580C);
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.3);
        }

        .action-btn.secondary {
            background: #FFFBEB;
            border: 2px solid #FED7AA;
            color: #1C1917;
        }

        /* Voice Waves */
        .voice-waves {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .voice-waves span {
            width: 3px;
            height: 12px;
            background: white;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        .voice-waves span:nth-child(1) { animation-delay: 0s; }
        .voice-waves span:nth-child(2) { animation-delay: 0.1s; }
        .voice-waves span:nth-child(3) { animation-delay: 0.2s; }
        .voice-waves span:nth-child(4) { animation-delay: 0.3s; }
        .voice-waves span:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        .action-btn.listening {
            background: linear-gradient(135deg, #EF4444, #DC2626) !important;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .action-btn.call-mode {
            background: linear-gradient(135deg, #22C55E, #16A34A) !important;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.3);
        }

        .action-btn.call-mode.listening {
            background: linear-gradient(135deg, #EF4444, #DC2626) !important;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ===== 全屏通话界面 ===== */
        .call-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
            overflow: hidden;
        }
        .call-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 摄像头画面作为通话背景 */
        .call-video-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        /* 右上角摄像头切换按钮 */
        .call-camera-switch {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 10px);
            right: 16px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .call-camera-switch:active { background: rgba(255,255,255,0.4); }
        .call-video-mask {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(0,0,0,0.5) 0%,
                rgba(0,0,0,0.2) 30%,
                rgba(0,0,0,0.2) 60%,
                rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* 顶部区域 */
        .call-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 16px;
            z-index: 2;
        }
        .call-timer {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .call-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* 中间区域：头像 + 状态 */
        .call-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 2;
        }

        /* 头像容器（带呼吸光圈） */
        .call-avatar-wrap {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .call-avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(249,115,22,0.4);
            animation: callBreath 3s ease-in-out infinite;
        }
        .call-avatar-ring2 {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            border: 1.5px solid rgba(249,115,22,0.2);
            animation: callBreath 3s ease-in-out infinite 0.5s;
        }
        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F97316, #FB923C);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 0 30px rgba(249,115,22,0.3);
        }

        @keyframes callBreath {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* AI名字 */
        .call-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        /* 状态文字 */
        .call-status {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            min-height: 20px;
            text-align: center;
            max-width: 280px;
            line-height: 1.4;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* 语音波形条 */
        .call-voice-bars {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 36px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .call-voice-bars.active {
            opacity: 1;
        }
        .call-voice-bars span {
            width: 4px;
            border-radius: 3px;
            background: rgba(249,115,22,0.8);
            transition: height 0.15s ease;
        }
        .call-voice-bars.listening span {
            background: rgba(34,197,94,0.8);
        }

        /* 字幕区域 */
        .call-subtitle-area {
            position: absolute;
            bottom: 160px;
            left: 20px;
            right: 20px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .call-subtitle {
            padding: 10px 18px;
            border-radius: 16px;
            font-size: 16px;
            line-height: 1.6;
            max-width: 92%;
            text-align: center;
            min-height: 24px;
            word-break: break-word;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .call-subtitle.ai {
            background: rgba(249,115,22,0.2);
            border: 1px solid rgba(249,115,22,0.3);
            color: #fff;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .call-subtitle.user {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .call-subtitle-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2px;
        }
        .call-subtitle .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: rgba(255,255,255,0.7);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 通话界面任务清单 */
        .call-task-container {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 12px;
            z-index: 4;
            max-width: 200px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .call-task-container:empty { display: none; }
        .call-task-container .task-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 10px 12px;
            margin-top: 50px;
        }
        .call-task-container .task-card-header {
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .call-task-container .task-card-title {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
        }
        .call-task-container .task-progress {
            color: rgba(249,115,22,0.9);
            font-size: 12px;
        }
        .call-task-container .task-progress-bar {
            background: rgba(255,255,255,0.1);
        }
        .call-task-container .task-name {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
        }
        .call-task-container .task-name.done {
            color: rgba(255,255,255,0.4);
        }
        .call-task-container .task-desc {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
        }
        .call-task-container .task-check {
            border-color: rgba(255,255,255,0.3);
        }
        .call-task-container .task-check.done {
            background: #22C55E;
            border-color: #22C55E;
        }
        .call-task-container .task-check.active {
            border-color: #F97316;
        }
        .call-task-container .task-done-btn {
            font-size: 10px;
            padding: 2px 10px;
        }
        .call-task-container .task-step-num {
            color: rgba(255,255,255,0.5);
        }
        .call-task-container .task-step-num.done {
            color: rgba(255,255,255,0.3);
        }
        .call-task-container .task-item {
            padding: 4px 0;
        }
        .call-task-container .task-complete-banner {
            color: rgba(255,255,255,0.9);
            font-size: 12px;
        }

        /* 底部按钮区 */
        .call-bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding-bottom: 20px;
            z-index: 2;
        }
        .call-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .call-action-btn .btn-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .call-action-btn:active .btn-circle {
            transform: scale(0.92);
        }
        .call-action-btn .btn-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .call-hangup .btn-circle {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        }
        .call-mute .btn-circle {
            background: rgba(255,255,255,0.15);
        }
        .call-mute.muted .btn-circle {
            background: rgba(239,68,68,0.3);
        }
        .call-speaker .btn-circle {
            background: rgba(255,255,255,0.15);
        }

        /* 静音 / 免提按钮的 on/off 图标切换 */
        .call-action-btn .icon-off { display: none; }
        .call-mute.muted .icon-on { display: none; }
        .call-mute.muted .icon-off { display: block; }
        .call-speaker.earpiece .icon-on { display: none; }
        .call-speaker.earpiece .icon-off { display: block; }

        /* 静音激活时，按钮 label 染红，增强反馈 */
        .call-mute.muted .btn-label {
            color: rgba(239,68,68,0.95);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
        }

        .hidden { display: none !important; }

        /* Store Panel */
        .store-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .store-panel.open {
            transform: translateY(0);
        }

        .store-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid #F5F5F4;
            flex-shrink: 0;
        }

        .store-panel-header h2 {
            font-size: 17px;
            font-weight: 700;
        }

        .store-panel-close {
            width: 32px;
            height: 32px;
            background: #F5F5F4;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #78716C;
        }

        .store-panel-body {
            padding: 12px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 20px));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

            font-size: 14px;
            font-weight: 700;
            color: #1C1917;
        }

            font-size: 12px;
            font-weight: 600;
            color: #F97316;

            background: #F5F5F4;
            border-radius: 2px;

        .task-check {

            height: 22px;

            font-size: 13px;

            font-size: 14px;
            font-weight: 600;
            color: #1C1917;

            color: #A8A29E;
            margin-top: 2px;

        .task-step-num {
            font-size: 11px;
            font-weight: 700;
            color: #F97316;
            margin-right: 4px;

        .task-complete-banner {

            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            align-self: center;
        }
    </style>

                    </svg>
                    <!-- 麦克风关（静音）：同样形状 + 一道斜杠 -->
                    <svg class="icon-off" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 9V6a3 3 0 0 1 6 0v3"/>
                        <path d="M15 12v2a3 3 0 0 1-3 3 3 3 0 0 1-2.85-2.04"/>
                        <path d="M5 11a7 7 0 0 0 12.55 4.27"/>
                        <line x1="12" y1="18" x2="12" y2="22"/>
                        <line x1="8" y1="22" x2="16" y2="22"/>

            <button class="call-action-btn call-hangup" onclick="toggleCallMode()">
                <div class="btn-circle">
                    <!-- 挂断：标准 call_end 形状，直接画好不需 transform，永远在 viewBox 内 -->
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
                        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.88 1.12-2.66 1.86-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.965.965 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.78-.74-1.68-1.36-2.66-1.86a1.01 1.01 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                    </svg>
                </div>
                <span class="btn-label">挂断</span>
            </button>
            <button class="call-action-btn call-speaker" id="callSpeakerBtn" onclick="toggleCallSpeaker()">
                <div class="btn-circle">
                    <!-- 免提（默认）：实心喇叭 + 两道音波 -->
                    <svg class="icon-on" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="white" stroke="none"/>
                        <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
                        <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
                    </svg>
                    <!-- 听筒：喇叭 + X -->
                    <svg class="icon-off" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5L6 9H3v6h3l5 4V5z" fill="white" stroke="none"/>
                        <line x1="16" y1="9" x2="22" y2="15"/>
                        <line x1="22" y1="9" x2="16" y2="15"/>
                    </svg>
                </div>
                <span class="btn-label">免提</span>
            </button>
        </div>
    </div>

    <script>

        // 化妆品店铺数据（示例数据，按城市常见连锁店）
        const COSMETIC_STORES = [
            { id: 's1', name: '丝芙兰 SEPHORA', address: '市中心商业广场1层', lat: 0, lng: 0, tags: ['国际品牌', '彩妆', '护肤'] },
            { id: 's2', name: '屈臣氏 Watsons', address: '万达广场B1层', lat: 0, lng: 0, tags: ['日用', '护肤', '平价'] },
            { id: 's3', name: 'THE COLORIST 调色师', address: '大悦城2层L205', lat: 0, lng: 0, tags: ['潮流彩妆', '网红'] },
            { id: 's4', name: '完美日记体验店', address: '太古里北街18号', lat: 0, lng: 0, tags: ['国货', '彩妆'] },
            { id: 's5', name: '妍丽 COSMO', address: '银泰百货3层', lat: 0, lng: 0, tags: ['高端护肤', '进口'] },
            { id: 's6', name: '名创优品美妆区', address: '步行街中段88号', lat: 0, lng: 0, tags: ['平价', '日用'] },
            { id: 's7', name: 'WOW COLOUR', address: '龙湖天街1层', lat: 0, lng: 0, tags: ['潮流', '彩妆集合'] },
            { id: 's8', name: '植村秀专柜', address: 'SKP百货1层', lat: 0, lng: 0, tags: ['高端彩妆', '卸妆油'] },
        ];

        const $ = id => document.getElementById(id);
        let stream = null;
        let listening = false;
        let processing = false;
        let voiceEnabled = true;
        let history = [];
        let userLat = null;
        let userLng = null;
        let storePanelOpen = false;
        let settingsPanelOpen = false;
        let aiEnabled = true; // 内置默认 API Key，开箱即用
        let aiCallbacks = {}; // 请求ID -> {resolve, reject} 的映射
        let aiCallIdCounter = 0;
        let callMode = false; // 通话模式：像打电话一样连续对话
        let speaking = false; // TTS是否正在播报
        const PRIVACY_CONSENT_KEY = 'vision_upload_consent';
        let visionConsentGranted = localStorage.getItem(PRIVACY_CONSENT_KEY) === '1';

        // 摄像头方向：'user' = 前置，'environment' = 后置
        let currentFacingMode = 'user';
        let cameraSwitching = false;

        // 初始化摄像头（带重试，WKWebView权限可能需要时间）
        async function initCamera(retries) {
            retries = retries || 0;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                $('placeholder').querySelector('p').textContent = '摄像头API不可用';
                $('placeholder').querySelector('small').textContent = '请确保使用真机运行';
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                $('camera').srcObject = stream;
                await $('camera').play();
                $('placeholder').classList.add('hidden');
                // 不镜像，直接显示原始画面
                $('camera').style.transform = 'none';
                $('faceCanvas').style.transform = 'none';
                // 同步到通话界面背景
                if (callMode) syncCallVideo();
                // 摄像头就绪后初始化人脸网格检测
                initFaceMesh();
                // 自动启动 Gemini Live 实时分析
                setTimeout(() => {
                    if (visionEnabled) {
                        startGeminiLive();
                    }
                }, 1000);
            } catch (e) {
                if (retries < 3) {
                    // 重试，每次间隔递增
                    setTimeout(() => initCamera(retries + 1), 1000 * (retries + 1));
                } else {
                    $('placeholder').querySelector('p').textContent = '无法访问摄像头';
                    $('placeholder').querySelector('small').textContent = e.message || '请检查权限设置';
                }
            }
        }

        // 切换前后摄像头
        async function switchCamera() {
            if (cameraSwitching) return;
            cameraSwitching = true;

            // 停止人脸检测
            stopNativeFaceDetection();

            // 停止当前摄像头流
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            // 切换方向
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';

            // 重新初始化摄像头
            await initCamera();
            cameraSwitching = false;
        }

        // 截取画面（高清版用于视觉检测）
        function captureFrame(highRes) {
            if (!stream) return null;
            const canvas = document.createElement('canvas');
            const w = highRes ? 640 : 320;
            const h = highRes ? 480 : 240;
            const q = highRes ? 0.85 : 0.6;
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage($('camera'), 0, 0, w, h);
            return canvas.toDataURL('image/jpeg', q).split(',')[1];
        }

        function ensureVisionConsent() {
            if (visionConsentGranted) return true;
            const ok = window.confirm('拍照分析需要上传当前画面到AI服务进行处理。是否同意？');
            if (ok) {
                visionConsentGranted = true;
                localStorage.setItem(PRIVACY_CONSENT_KEY, '1');
            }
            return ok;
        }

        // =====================================================
        // 原生语音识别桥接（替代 Web Speech API）
        // =====================================================

        // 从 Swift 原生调用的回调函数
        window.nativeSpeechStarted = function() {
            listening = true;
            // 通话模式下不切换按钮图标/动画，保持按钮稳定不抖动
            if (!callMode) {
                $('voiceIcon').classList.add('hidden');
                $('voiceWave').classList.remove('hidden');
                $('voiceBtn').classList.add('listening');
            }
            // 通话模式下不在录音开始时打断TTS，只在检测到用户实际说话时打断（见 nativeSpeechPartial）
            $('aiStatus').textContent = callMode ? '正在听你说...' : '正在听...';
            if (callMode && !speaking) updateCallOverlayStatus('正在听你说...');
        };

        // 实时显示语音识别的部分结果
        let lastPartialUpdate = 0;
        let _nativeSilenceTimer = null; // 原生识别静默计时器
        let _lastPartialText = '';      // 最后一次 partial 文本
        const NATIVE_SILENCE_TIMEOUT = 1500; // 1.5秒无新partial则停止录音，强制出final结果

        window.nativeSpeechPartial = function(text) {
            const now = Date.now();
            if (now - lastPartialUpdate < 200) return;
            lastPartialUpdate = now;
            if (text && text.trim()) {
                const t = text.trim();
                // Whisper 状态提示只显示在状态栏，不显示为字幕
                if (t === '识别中...' || t === '正在听...' || t === '超时，正在识别...') {
                    $('aiStatus').textContent = t;
                    if (callMode) updateCallOverlayStatus(t);
                    return;
                }
                $('aiStatus').textContent = text;
                if (callMode) showCallSubtitle(text, 'user');
                _lastPartialText = text.trim();
                // 通话模式下：收到partial后启动静默计时器
                // 如果2秒内没有新partial或final，手动停止录音强制出结果
                if (callMode && !processing) {
                    if (_nativeSilenceTimer) clearTimeout(_nativeSilenceTimer);
                    _nativeSilenceTimer = setTimeout(() => {
                        _nativeSilenceTimer = null;
                        if (callMode && listening && !processing && !speaking && _lastPartialText) {
                            // 强制停止录音，触发 SFSpeechRecognizer 输出 isFinal=true
                            stopListening();
                        }
                    }, NATIVE_SILENCE_TIMEOUT);
                }
            }
        };

        window.nativeSpeechResult = function(text) {
            console.log('[语音识别] nativeSpeechResult 被调用，文本:', text);
            // 清除静默计时器
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();

            // 强制更新状态显示
            $('aiStatus').textContent = callMode ? '小美正在思考...' : '准备就绪';

            if (text && text.trim()) {
                // 显示用户说话的字幕
                if (callMode) showCallSubtitle(text.trim(), 'user');
                handleInput(text.trim());
            }
        };

        window.nativeSpeechEnded = function() {
            console.log('[语音识别] nativeSpeechEnded 被调用');
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            const hadText = _lastPartialText && _lastPartialText.trim();
            console.log('[语音识别] hadText:', hadText, 'callMode:', callMode);
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();

            // 强制更新状态显示
            $('aiStatus').textContent = callMode ? '小美正在思考...' : '准备就绪';

            // 通话模式下：只有在没识别到内容时才自动重新开始听
            // 如果识别到了内容，等AI回复完再开始听
            if (callMode && !hadText && !processing && !speaking && !_streamTTSActive) {
                console.log('[语音识别] 通话模式：没有识别到内容，300ms后重新开始监听');
                setTimeout(() => {
                    if (callMode && !listening && !processing && !speaking && !_streamTTSActive) {
                        startListening();
                    }
                }, 300);
            } else if (callMode && hadText) {
                console.log('[语音识别] 通话模式：识别到内容，等待AI处理');
            }
        };

        window.nativeSpeechError = function(error) {
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            listening = false;
            resetVoiceUI();
            // 通话模式下自动重试（除非正在播报）
            if (callMode && !processing && !speaking) {
                setTimeout(() => {
                    if (callMode && !listening && !processing && !speaking) {
                        startListening();
                    }
                }, 1000);
            }
        };

        function resetVoiceUI() {
            // 通话模式下不切换按钮图标，保持稳定
            if (!callMode) {
                $('voiceIcon').classList.remove('hidden');
                $('voiceWave').classList.add('hidden');
                $('voiceBtn').classList.remove('listening');
                $('aiStatus').textContent = '准备就绪';
            }
        }

        // 开始录音的统一入口（带节流，防止快速循环导致界面乱动）
        let lastListenTime = 0;
        function startListening() {
            const now = Date.now();
            const minInterval = callMode ? 500 : 1500;
            if (now - lastListenTime < minInterval) return;
            if (listening || processing) return;
            // TTS播放时不开麦克风，避免回声触发误打断
            if (speaking || _streamTTSActive) return;
            lastListenTime = now;
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.startVoice) {
                window.webkit.messageHandlers.startVoice.postMessage({});
            }
        }

        // 停止录音
        function stopListening() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopVoice) {
                window.webkit.messageHandlers.stopVoice.postMessage({});
            }
        }

        // =====================================================
        // 通话模式：Web Speech API 持续识别（参考 test8.html）
        // continuous: true 保持持续识别，不会每句话都断开重连
        // interimResults: true 实时显示识别文字
        // 静默检测：2.5秒无新语音则处理积累文本
        // =====================================================
        let callRecognition = null;
        let callSilenceTimer = null;
        let callLastSoundTime = 0;
        let callInterimText = '';
        const CALL_SILENCE_TIMEOUT = 2500;
        let callRecogLastActivity = 0; // watchdog: 识别最后活跃时间

        function startCallModeRecognition() {
            if (callMuted) return;
            // 始终使用原生语音识别（Native SFSpeechRecognizer），
            // 避免 WKWebView 中 Web Speech API 在 Edge TTS 播放后
            // 因音频会话冲突导致识别失效
            if (!listening && !processing) {
                lastListenTime = 0; // 绕过节流
                startListening();
            }
        }

        function stopCallModeRecognition() {
            stopCallSilenceDetection();
            if (_nativeSilenceTimer) { clearTimeout(_nativeSilenceTimer); _nativeSilenceTimer = null; }
            _lastPartialText = '';
            if (listening) stopListening();
            callInterimText = '';
            listening = false;
        }

        function startCallSilenceDetection() {
            stopCallSilenceDetection();
            callSilenceTimer = setInterval(() => {
                if (!callMode) { stopCallSilenceDetection(); return; }
                if (processing) return;

                const elapsed = Date.now() - callLastSoundTime;
                if (elapsed >= CALL_SILENCE_TIMEOUT && callInterimText && callInterimText.length > 0) {
                    const text = callInterimText;
                    callInterimText = '';

                    // 停止当前识别（会在 onend 中自动重启）
                    if (callRecognition) {
                        try { callRecognition.stop(); } catch(e) {}
                    }

                    if (!processing) {
                        handleInput(text);
                    }
                }
            }, 500);
        }

        function stopCallSilenceDetection() {
            if (callSilenceTimer) {
                clearInterval(callSilenceTimer);
                callSilenceTimer = null;
            }
        }

        // 通话计时器
        let callTimerInterval = null;
        let callStartTime = 0;

        // 通话声波动画
        let callVoiceBarsInterval = null;

        function startCallTimer() {
            callStartTime = Date.now();
            $('callTimer').textContent = '00:00';
            callTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const s = String(elapsed % 60).padStart(2, '0');
                $('callTimer').textContent = m + ':' + s;
            }, 1000);
        }

        function stopCallTimer() {
            if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
        }

        // 声波动画：根据状态显示不同波形
        function startCallVoiceBars() {
            const bars = $('callVoiceBars');
            if (!bars) return;
            bars.classList.add('active');
            const spans = bars.querySelectorAll('span');
            callVoiceBarsInterval = setInterval(() => {
                if (speaking) {
                    // AI 说话：橙色较大波形
                    bars.classList.remove('listening');
                    spans.forEach(s => {
                        s.style.height = (8 + Math.random() * 24) + 'px';
                    });
                } else if (listening) {
                    // 用户说话：绿色较小波形
                    bars.classList.add('listening');
                    spans.forEach(s => {
                        s.style.height = (4 + Math.random() * 16) + 'px';
                    });
                } else {
                    // 空闲：微小波动
                    bars.classList.remove('listening');
                    spans.forEach(s => {
                        s.style.height = (3 + Math.random() * 5) + 'px';
                    });
                }
            }, 120);
        }

        function stopCallVoiceBars() {
            if (callVoiceBarsInterval) { clearInterval(callVoiceBarsInterval); callVoiceBarsInterval = null; }
            const bars = $('callVoiceBars');
            if (bars) {
                bars.classList.remove('active');
                bars.classList.remove('listening');
            }
        }

        // 更新通话界面状态
        function updateCallOverlayStatus(text) {
            const s = $('callStatus');
            if (s) s.textContent = text;
        }

        // ===== 字幕系统（逐字显示） =====
        let _subtitleTimer = null;
        let _subtitleQueue = [];

        // 显示字幕（逐字打字机效果）
        function showCallSubtitle(text, type) {
            // type: 'ai' 或 'user'
            if (!callMode || !text) return;
            const area = $('callSubtitleArea');
            if (!area) return;

            // 清除之前的同类型字幕
            const old = area.querySelector('.call-subtitle.' + type);
            if (old) old.remove();

            // 清除旧的打字定时器
            if (type === 'ai' && _subtitleTimer) {
                clearInterval(_subtitleTimer);
                _subtitleTimer = null;
            }

            const div = document.createElement('div');
            div.className = 'call-subtitle ' + type;

            if (type === 'user') {
                // 用户文字直接显示（实时跟随识别）
                div.textContent = text;
                area.appendChild(div);
                // 3秒后自动消失
                setTimeout(() => { if (div.parentNode) div.remove(); }, 5000);
            } else {
                // AI 回复逐字显示
                div.innerHTML = '<span class="cursor"></span>';
                area.appendChild(div);
                let idx = 0;
                const chars = text.split('');
                _subtitleTimer = setInterval(() => {
                    if (idx < chars.length) {
                        // 移除光标，添加字符，再加光标
                        const cursor = div.querySelector('.cursor');
                        if (cursor) cursor.remove();
                        div.appendChild(document.createTextNode(chars[idx]));
                        // 还有后续字符才加光标
                        if (idx < chars.length - 1) {
                            const c = document.createElement('span');
                            c.className = 'cursor';
                            div.appendChild(c);
                        }
                        idx++;
                    } else {
                        clearInterval(_subtitleTimer);
                        _subtitleTimer = null;
                        // 移除光标
                        const cursor = div.querySelector('.cursor');
                        if (cursor) cursor.remove();
                        // 显示5秒后淡出
                        setTimeout(() => { if (div.parentNode) div.remove(); }, 8000);
                    }
                }, 80); // 每80ms显示一个字
            }

            // 最多保留2条字幕
            while (area.children.length > 2) {
                area.removeChild(area.firstChild);
            }
        }

        function clearCallSubtitles() {
            if (_subtitleTimer) { clearInterval(_subtitleTimer); _subtitleTimer = null; }
            const area = $('callSubtitleArea');
            if (area) area.innerHTML = '';
        }

        // 同步摄像头到通话界面
        function syncCallVideo() {
            const callVideo = $('callVideoBg');
            const mainVideo = $('camera');
            if (!callVideo || !mainVideo) return;
            if (mainVideo.srcObject) {
                callVideo.srcObject = mainVideo.srcObject;
            }
        }

        // 静音功能
        let callMuted = false;
        function toggleCallMute() {
            callMuted = !callMuted;
            const btn = $('callMuteBtn');
            if (callMuted) {
                btn.classList.add('muted');
                btn.querySelector('.btn-label').textContent = '取消静音';
                stopCallModeRecognition();
                updateCallOverlayStatus('已静音');
            } else {
                btn.classList.remove('muted');
                btn.querySelector('.btn-label').textContent = '静音';
                if (callMode && !processing && !speaking) {
                    startCallModeRecognition();
                }
                updateCallOverlayStatus('正在听你说...');
            }
        }

        // 免提（切换语音播报）
        function toggleCallSpeaker() {
            voiceEnabled = !voiceEnabled;
            $('spkOn').classList.toggle('hidden', !voiceEnabled);
            $('spkOff').classList.toggle('hidden', voiceEnabled);
            if (!voiceEnabled) stopSpeak();
            const btn = $('callSpeakerBtn');
            // CSS .earpiece 状态控制图标切换
            btn.classList.toggle('earpiece', !voiceEnabled);
            btn.querySelector('.btn-label').textContent = voiceEnabled ? '免提' : '听筒';
        }

        // 进入/退出通话模式
        function toggleCallMode() {
            console.log('[通话] toggleCallMode 被调用，当前 callMode:', callMode);
            if (callMode) {
                // 退出通话模式
                callMode = false;
                callMuted = false;
                stopCallModeRecognition();
                if (speaking) stopSpeak();
                stopCallTimer();
                stopCallVoiceBars();
                clearCallSubtitles();
                // 停止 Gemini Live

        // 流式AI响应：边生成边显示 + 通话模式边生成边播报
        let _streamingDiv = null;
        let _streamingCallId = null;
        let _streamSentenceQueue = [];   // 待播报的句子队列
        let _streamSentenceBuffer = '';  // 当前积累的不完整句子
        let _streamTTSActive = false;    // 是否正在逐句播报
        let _streamingSpoke = false;     // 本次回复是否用了逐句播报

        let _streamingRawText = '';      // 累积原始文本（含标记）

        window.nativeAIChunk = function(chunk, callId) {
            console.log('[AI] 流式块接收，callId:', callId, '块长度:', chunk.length, '内容:', chunk.substring(0, 50));
            // 视觉：流式显示文字
            if (!_streamingDiv || _streamingCallId !== callId) {
                hideTyping();
                _streamingDiv = document.createElement('div');
                _streamingDiv.className = 'message msg-ai';
                _streamingDiv.textContent = '';
                _streamingCallId = callId;
                _streamingRawText = '';
                $('chat').appendChild(_streamingDiv);
            }
            _streamingRawText += chunk;
            // 显示时过滤掉 [CHECKLIST]...[/CHECKLIST]、[DONE:n]、[ALLDONE] 标记
            _streamingDiv.textContent = _streamingRawText
                .replace(/\[CHECKLIST\][\s\S]*?(\[\/CHECKLIST\]|$)/g, '')
                .replace(/\[DONE:\d+\]/g, '')
                .replace(/\[ALLDONE\]/g, '')
                .trim();
            $('chat').scrollTop = $('chat').scrollHeight;

            // 逐句播报：检测句子边界，边输出边说话（语音播报启用时）
            if (voiceEnabled) {
                // 检测到任务清单标记时，跳过流式播报（让 processTaskMarkers 统一处理）
                if (_streamingRawText.includes('[CHECKLIST]')) {
                    return;
                }
                _streamSentenceBuffer += chunk;
                // 在中英文句号/叹号/问号处断句，让句子更完整流畅
                const re = /[。！？.!?]/;
                let match;
                while ((match = re.exec(_streamSentenceBuffer)) !== null) {
                    const sentence = _streamSentenceBuffer.substring(0, match.index + 1).trim();
                    _streamSentenceBuffer = _streamSentenceBuffer.substring(match.index + 1);
                    if (sentence && sentence.length > 1) {
                        _streamSentenceQueue.push(sentence);
                    }
                }
                // 只要有1句话就立即播报，减少等待时间
                if (_streamSentenceQueue.length >= 1 && !_streamTTSActive) {
                    _streamingSpoke = true;
                    _speakNextStream();
                }
            }
        };

        function _speakNextStream() {
            if (_streamSentenceQueue.length === 0) {
                _streamTTSActive = false;
                return;
            }
            _streamTTSActive = true;
            speaking = true;
            // 快速播报第一句，减少等待时间
            let combinedText = _streamSentenceQueue.shift();
            while (_streamSentenceQueue.length > 0 && combinedText.length < 30) {
                combinedText += _streamSentenceQueue.shift();
            }
            if (callMode) {
                showCallSubtitle(combinedText, 'ai');
                updateCallOverlayStatus('小美正在说...');
                $('aiStatus').textContent = '小美正在说...';
            }
            if (_speakSafety) clearTimeout(_speakSafety);
            _speakSafety = setTimeout(() => {
                if (speaking || _streamTTSActive) {
                    // 超时：停止当前句子，跳到下一句（不清空整个队列）
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopSpeak) {
                        window.webkit.messageHandlers.stopSpeak.postMessage({});
                    }
                    if (_streamSentenceQueue.length > 0) {
                        _speakNextStream();
                    } else {
                        _streamTTSActive = false;
                        speaking = false;
                        if (callMode && !listening && !processing) {
                            setTimeout(() => {
                                if (callMode && !listening && !processing && !speaking) {
                                    startCallModeRecognition();
                                }
                            }, 500);
                        }
                    }
                }
            }, 12000);
            // 清理符号
            const cleanText = cleanTextForSpeech(combinedText);
            console.log('[TTS] 原文:', combinedText.substring(0, 50), '清理后:', cleanText.substring(0, 50));
            // 如果清理后文本太短或为空，跳过播报，继续下一句
            if (!cleanText || cleanText.length < 2) {
                console.log('[TTS] 文本太短，跳过:', cleanText);
                if (_streamSentenceQueue.length > 0) {
                    _speakNextStream();
                } else {
                    _streamTTSActive = false;
                    speaking = false;
                }
                return;
            }
            console.log('[TTS] 发送播报请求，剩余队列:', _streamSentenceQueue.length);
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeSpeak) {
                window.webkit.messageHandlers.nativeSpeak.postMessage({ text: cleanText, rate: 0.52, pitch: 1.1 });
            }
        }

        function _flushStreamBuffer() {
            if (_streamSentenceBuffer.trim()) {
                _streamSentenceQueue.push(_streamSentenceBuffer.trim());
                _streamSentenceBuffer = '';
            }
            if (!_streamTTSActive && _streamSentenceQueue.length > 0) {
                _streamingSpoke = true;
                _speakNextStream();
            }
        }

        function _clearStreamQueue() {
            _streamSentenceQueue = [];
            _streamSentenceBuffer = '';
            _streamTTSActive = false;
            _streamingSpoke = false;
        }

        // 在用户位置附近随机生成店铺坐标（演示用）
        function randomizeStoresAround(lat, lng) {
            COSMETIC_STORES.forEach((store, i) => {
                // 在 0.5~5km 范围内随机分布
                const angle = (i / COSMETIC_STORES.length) * Math.PI * 2;
                const dist = 0.005 + Math.random() * 0.04; // ~0.5km to ~4.5km
                store.lat = lat + dist * Math.cos(angle);
                store.lng = lng + dist * Math.sin(angle);
            });
        }

        function formatDistance(meters) {
            if (meters < 1000) {
                return Math.round(meters) + 'm';
            }
            return (meters / 1000).toFixed(1) + 'km';
        }

        function calcDistance(lat1, lng1, lat2, lng2) {
            // Haversine 公式
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getStoreDistanceText(store) {
            if (userLat === null || userLng === null || store.lat === 0) return '定位中...';
            const dist = calcDistance(userLat, userLng, store.lat, store.lng);
            return formatDistance(dist);
        }

        function getStoresWithDistance() {
            return COSMETIC_STORES.map(s => ({
                ...s,
                dist: (userLat !== null && userLng !== null && s.lat !== 0)
                    ? calcDistance(userLat, userLng, s.lat, s.lng)
                    : Infinity
            })).sort((a, b) => a.dist - b.dist);
        }

        // 清理文本中的符号，为盲人用户保留清晰的停顿
        function cleanTextForSpeech(text) {
            return text
                // 移除 emoji 表情符号（不读出来）
                .replace(/[\u{1F600}-\u{1F64F}]/gu, '') // 表情符号
                .replace(/[\u{1F300}-\u{1F5FF}]/gu, '') // 符号和象形文字
                .replace(/[\u{1F680}-\u{1F6FF}]/gu, '') // 交通和地图符号
                .replace(/[\u{1F700}-\u{1F77F}]/gu, '') // 炼金术符号
                .replace(/[\u{1F780}-\u{1F7FF}]/gu, '') // 几何形状扩展
                .replace(/[\u{1F800}-\u{1F8FF}]/gu, '') // 补充箭头-C
                .replace(/[\u{1F900}-\u{1F9FF}]/gu, '') // 补充符号和象形文字
                .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '') // 扩展-A
                .replace(/[\u{1FA70}-\u{1FAFF}]/gu, '') // 符号和象形文字扩展-A
                .replace(/[\u{2600}-\u{26FF}]/gu, '')   // 杂项符号
                .replace(/[\u{2700}-\u{27BF}]/gu, '')   // 装饰符号
                .replace(/[\u{FE00}-\u{FE0F}]/gu, '')   // 变体选择器
                .replace(/[\u{1F1E0}-\u{1F1FF}]/gu, '') // 旗帜
                // 特殊符号替换为逗号（产生明显停顿）
                .replace(/[*#\-_~`\[\]{}()（）【】《》<>@$%^&+=|\\\/'"\"]/g, '，')
                // 句末标点统一为句号（产生长停顿）
                .replace(/[。！？.!?]/g, '。')
                // 其他标点统一为逗号（产生短停顿）
                .replace(/[，、；：,.;:]/g, '，')
                // 合并多个逗号
                .replace(/，+/g, '，')
                // 合并多个句号
                .replace(/。+/g, '。')
                // 移除多余空格
                .replace(/\s+/g, ' ')
                .trim();
        }

        // 语音播报（使用原生 AVSpeechSynthesizer）
        let _speakSafety = null;
        function speak(text) {
            // 通话模式始终显示AI字幕（不管语音开关）
            if (callMode) showCallSubtitle(text, 'ai');
            // 通话模式下强制启用语音，否则检查开关
            if (!callMode && !voiceEnabled) return;
            // 立即标记为正在说话，避免 startListening 的竞态条件
            speaking = true;
            // 安全计时器：如果 TTS 回调未触发，最多 30 秒后自动重置
            if (_speakSafety) clearTimeout(_speakSafety);
            _speakSafety = setTimeout(() => {
                if (speaking) {
                    speaking = false;
                    if (callMode && !listening && !processing) {
                        startCallModeRecognition();
                    }
                }
            }, 30000);
            // 清理符号
            const cleanText = cleanTextForSpeech(text);
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativeSpeak) {
                window.webkit.messageHandlers.nativeSpeak.postMessage({ text: cleanText, rate: 0.52, pitch: 1.1 });
            } else if (window.speechSynthesis) {
                // 浏览器回退
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(cleanText);
                u.lang = 'zh-CN';
                u.rate = 0.9;
                u.pitch = 1.1;
                u.onend = () => { speaking = false; window.nativeTTSEnded(); };
                window.speechSynthesis.speak(u);
            } else {
                speaking = false; // 没有可用的TTS
            }
        }

        function stopSpeak() {
            speaking = false;
            _clearStreamQueue(); // 清除流式逐句播报队列
            _streamTTSActive = false;
            if (_speakSafety) { clearTimeout(_speakSafety); _speakSafety = null; }
            // 停止AI字幕打字动画
            if (_subtitleTimer) { clearInterval(_subtitleTimer); _subtitleTimer = null; }
            // 停止音量监听
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopLevelMonitor) {
                window.webkit.messageHandlers.stopLevelMonitor.postMessage({});
            }
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopSpeak) {
                window.webkit.messageHandlers.stopSpeak.postMessage({});
            } else if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
        }

        // 云端TTS错误回调

        // 原生 TTS 回调
        window.nativeTTSStarted = function() {

            if (listening) {
                console.log('[TTS] AI 开始说话，停止语音识别');

            }

        window.nativeTTSEnded = function() {
            // 逐句播报模式：播完一句，继续下一句（不停止音量监听，保持打断检测）
            if (_streamSentenceQueue.length > 0) {
                _speakNextStream();
                return;
            }

            // 队列暂时为空，但 SSE 可能还在发送 → 立即检查
            if (_streamTTSActive) {
                // 立即检查是否有新句子（无延迟）
                if (_streamSentenceQueue.length > 0) {
                    _speakNextStream();
                } else {
                    // 真的没有更多了，结束流式播报
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopLevelMonitor) {
                        window.webkit.messageHandlers.stopLevelMonitor.postMessage({});
                    }
                    _streamTTSActive = false;
                    speaking = false;
                    if (_speakSafety) { clearTimeout(_speakSafety); _speakSafety = null; }
                    if (callMode && !listening && !processing && !callMuted) {
                        setTimeout(() => {
                            if (callMode && !listening && !processing && !speaking) {
                                startCallModeRecognition();
                            }
                        }, 500);
                    }
                }
                return;
            }

            // 非流式：停止音量监听
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.stopLevelMonitor) {
                window.webkit.messageHandlers.stopLevelMonitor.postMessage({});
            }
            _streamTTSActive = false;
            speaking = false;
            if (_speakSafety) { clearTimeout(_speakSafety); _speakSafety = null; }
            if (callMode) {
                const statusText = listening ? '正在听你说...' : '通话中...';
                $('aiStatus').textContent = statusText;
                updateCallOverlayStatus(statusText);
                // TTS结束后确保识别在运行
                if (!listening && !processing && !callMuted) {
                    setTimeout(() => {
                        if (callMode && !listening && !processing && !speaking) {
                            startCallModeRecognition();
                        }
                    }, 500);
                }
            }
        };

        // 用户语音打断：TTS播放期间检测到用户说话
        window.nativeUserInterrupt = function() {

            stopSpeak();

                showCallSubtitle('', 'user'); // 清除字幕

        // 添加消息
        function addMessage(text, isUser = false) {
