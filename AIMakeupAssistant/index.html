            if (!currentTasks.length) return;

            const doneCount = currentTasks.filter(t => t.done).length;
            const total = currentTasks.length;
            const allDone = doneCount === total;
            const percent = Math.round((doneCount / total) * 100);

            // 找到当前进行中的步骤
            const activeIdx = currentTasks.findIndex(t => !t.done);

            let html = '<div class="task-card-header">';
            html += '<div class="task-card-title">美妆任务清单</div>';
            html += '<div class="task-progress">' + doneCount + '/' + total + '</div>';
            html += '</div>';
            html += '<div class="task-progress-bar"><div class="task-progress-fill" style="width:' + percent + '%"></div></div>';

            currentTasks.forEach((task, i) => {
                const stepNum = i + 1;
                const isDone = task.done;
                const isActive = (i === activeIdx);
                html += '<div class="task-item">';
                html += '<div class="task-check ' + (isDone ? 'done' : (isActive ? 'active' : '')) + '"></div>';
                html += '<div class="task-info">';
                html += '<div class="task-name ' + (isDone ? 'done' : '') + '">';
                html += '<span class="task-step-num ' + (isDone ? 'done' : '') + '">' + stepNum + '.</span>';
                html += task.name + '</div>';
                if (task.desc) html += '<div class="task-desc">' + task.desc + '</div>';
                html += '</div>';
                if (isActive && !isDone) {
                    html += '<button class="task-done-btn" onclick="markStepDone(' + i + ')">完成</button>';
                }
                html += '</div>';
            });

            if (allDone) {
                html += '<div class="task-complete-banner">&#127881; \u5168\u90e8\u5b8c\u6210\uff01\u4f60\u592a\u68d2\u4e86\uff01</div>';
            }

            // 如果卡片已存在，更新内容；否则创建新卡片
            if (taskCardId && document.getElementById(taskCardId)) {
                document.getElementById(taskCardId).innerHTML = html;
            } else {
                taskCardId = 'task-' + Date.now();
                const div = document.createElement('div');
                div.id = taskCardId;
                div.className = 'task-card';
                div.innerHTML = html;
                $('chat').appendChild(div);
                $('chat').scrollTop = $('chat').scrollHeight;
            }

            // 同步任务卡片到通话界面（全部完成则清空，不再占屏）
            const callTaskCont = $('callTaskContainer');
            if (callTaskCont) {
                if (allDone) {
                    // 全部完成 — 通话页直接消失，不残留
                    callTaskCont.innerHTML = '';
                    callTaskCont.classList.remove('has-task');
                } else {
                    callTaskCont.innerHTML = '<div class="task-card">' + html + '</div>';
                    callTaskCont.classList.add('has-task');
                }
            }
        }

        // 处理 AI 回复中的任务相关标记
        function processTaskMarkers(reply) {
            // 1. 检查是否有新的任务清单
            const checklist = parseChecklist(reply);
            if (checklist) {
                currentTasks = checklist;
                taskCardId = null; // 重新创建卡片
                renderTaskCard();
                // 清除流式播报队列和缓冲，避免冲突
                _clearStreamQueue();
                _streamSentenceBuffer = '';
                let stepsMsg = '好的，一共' + checklist.length + '个步骤。';
                checklist.forEach((step, i) => {
                    stepsMsg += '第' + (i + 1) + '步：' + step.name;
                    if (step.desc) stepsMsg += '，' + step.desc;
                    stepsMsg += '。';
                });
                stepsMsg += '现在开始第一步吧~';
                speak(stepsMsg);
                _streamingSpoke = true; // 防止 handleInput 再次 speak
                // 启动AI视觉检测
                startTaskDetection();
            }

            // 2. 检查完成标记
            const doneMarkers = parseDoneMarkers(reply);
            if (doneMarkers.length > 0 && currentTasks.length > 0) {
                doneMarkers.forEach(num => {
                    if (num >= 1 && num <= currentTasks.length) {
                        currentTasks[num - 1].done = true;
                    }
                });
                renderTaskCard();
                if (currentTasks.every(t => t.done)) stopTaskDetection();
            }

            // 3. 检查全部完成
            if (parseAllDone(reply) && currentTasks.length > 0) {
                currentTasks.forEach(t => t.done = true);
                renderTaskCard();
                stopTaskDetection();
            }

            // 返回清理后的文本
            return cleanReplyText(reply);
        }

        // 获取当前任务状态文本（注入 AI 上下文用）
        function getTaskContextText() {
            if (!currentTasks.length) return '';
            const doneCount = currentTasks.filter(t => t.done).length;
            if (doneCount === currentTasks.length) return '';

            const activeStep = currentTasks.findIndex(t => !t.done);
            let ctx = '\n\n[当前任务进度]：\n';
            currentTasks.forEach((t, i) => {
                ctx += (i + 1) + '. ' + t.name + (t.done ? '（已完成）' : '（未完成）') + '\n';
            });
            if (activeStep >= 0) {
                ctx += '当前正在进行：第' + (activeStep + 1) + '步「' + currentTasks[activeStep].name + '」\n';
                ctx += '【系统提示】请直接讲解这一步的操作方法和技巧，不要问用户是否完成，系统会自动检测。\n';
            }
            return ctx;
        }

        // =====================================================
        // 任务步骤完成（AI视觉检测 + 语音关键词 + 按钮三通道）
        // =====================================================

        let taskDetectionTimer = null;
        let isDetecting = false;
        let consecutiveYesCount = 0;
        const REQUIRED_YES_COUNT = 3; // 连续3次确认才算完成

        // 根据任务名判断检测区域类型
        // 返回: 'lip' | 'eyebrow' | 'eye' | 'cheek' | 'face' | 'general'
        function getTaskDetectionType(taskName) {
            if (!taskName) return 'face';
            const n = taskName.toLowerCase();
            if (n.includes('口红') || n.includes('唇') || n.includes('唇膏') || n.includes('唇彩') || n.includes('唇釉')) return 'lip';
            if (n.includes('眉') || n.includes('画眉') || n.includes('眉笔') || n.includes('眉粉')) return 'eyebrow';
            if (n.includes('眼影') || n.includes('眼妆') || n.includes('眼线') || n.includes('睫毛')) return 'eye';
            if (n.includes('腮红') || n.includes('脸颊') || n.includes('修容') || n.includes('高光')) return 'cheek';
            if (n.includes('粉底') || n.includes('底妆') || n.includes('遮瑕') || n.includes('隔离') || n.includes('防晒') || n.includes('洁面') || n.includes('洗脸') || n.includes('卸妆') || n.includes('面霜') || n.includes('护肤')) return 'face';
            return 'face'; // 默认检测整脸
        }

        // 检测区域的中文标签
        function getDetectionLabel(type) {
            const labels = { lip: '嘴唇', eyebrow: '眉毛', eye: '眼部', cheek: '脸颊', face: '面部' };
            return labels[type] || '检测区域';
        }

        // 判断用户语音是否表示完成当前步骤
        function isCompletionPhrase(text) {
            const keywords = ['完成', '好了', '做好了', '弄好了', '涂好了', '画好了',
                '洗好了', '抹好了', '搞定', '可以了', '下一步', 'ok', 'OK',
                '好啦', '完啦', '完了', '做完了', '涂完了', '画完了', '洗完了',
                '弄完了', '结束', '搞好了', '行了', '好的下一步', '继续'];
            const input = text.toLowerCase();
            return keywords.some(k => input.includes(k));
        }

        // 判断用户是否在请求教程/步骤指导（需要生成任务清单）
        function isTutorialRequest(text) {
            const keywords = ['教我', '怎么化', '怎么画', '怎么涂', '怎么护肤', '怎么卸妆',
                '化妆步骤', '护肤步骤', '教程', '步骤', '日常妆', '淡妆', '浓妆',
                '约会妆', '职场妆', '妆容', '全妆', '底妆', '眼妆',
                '教一下', '教教我', '指导', '学化妆', '学护肤'];
            return keywords.some(k => text.includes(k));
        }

        // 标记当前步骤完成
        function markStepDone(stepIndex) {
            if (stepIndex < 0 || stepIndex >= currentTasks.length) return;
            if (currentTasks[stepIndex].done) return;

            currentTasks[stepIndex].done = true;
            consecutiveYesCount = 0;
            renderTaskCard();

            const stepName = currentTasks[stepIndex].name;

            if (currentTasks.every(t => t.done)) {
                stopTaskDetection();
                const allDoneMsg = '「' + stepName + '」完成！所有步骤都完成啦，你太厉害了~';
                addMessage(allDoneMsg);
                speak(allDoneMsg);
                if (callMode) updateCallOverlayStatus('全部完成！');
            } else {
                // 播报完成并告知下一步
                const nextStep = currentTasks.findIndex(t => !t.done);
                const nextName = currentTasks[nextStep].name;
                const nextDesc = currentTasks[nextStep].desc;
                let msg = '「' + stepName + '」完成~ 很棒！下一步，第' + (nextStep + 1) + '步：' + nextName;
                if (nextDesc) msg += '，' + nextDesc;
                msg += '。';
                addMessage(msg);
                speak(msg);
                if (callMode) updateCallOverlayStatus('下一步：' + nextName);
            }
        }

        // 启动AI视觉检测
        function startTaskDetection() {
            stopTaskDetection();
            consecutiveYesCount = 0;

            if (nativeFaceAvailable) {
                // 最优先：Apple Vision 原生人脸检测（离线、高精度）
                fmInitializing = true;
                fmInitialLipColor = null;
                fmColorSamples = [];
                fmColorHistory = [];
                fmMovementHistory = [];
                fmCompletionCount = 0;
                startNativeFaceDetection();
                $('aiStatus').textContent = '原生AI检测已启动';
                // AI 视觉检测作为备用（低频率）
                taskDetectionTimer = setInterval(() => {
                    autoDetectTaskCompletion();
                }, 30000);
            } else if (faceMeshReady) {
                // 优先使用 Face Mesh 实时检测（参考 test8.html）
                fmInitializing = true;
                fmInitialLipColor = null;
                fmColorSamples = [];
                fmColorHistory = [];
                fmMovementHistory = [];
                fmCompletionCount = 0;
                startFaceMeshLoop();
                $('aiStatus').textContent = 'AI实时检测已启动';
                // 同时以低频率运行 AI 视觉检测作为备用
                taskDetectionTimer = setInterval(() => {
                    autoDetectTaskCompletion();
                }, 30000);
            } else {
                // Face Mesh 不可用，回退到纯 AI 视觉检测
                $('aiStatus').textContent = 'AI视觉检测已启动';
                taskDetectionTimer = setInterval(() => {
                    autoDetectTaskCompletion();
                }, 15000);
            }
        }

        // 停止AI视觉检测
        function stopTaskDetection() {
            if (taskDetectionTimer) {
                clearInterval(taskDetectionTimer);
                taskDetectionTimer = null;
            }
            stopNativeFaceDetection();
            stopFaceMeshLoop();
            isDetecting = false;
            consecutiveYesCount = 0;
            fmInitializing = false;
            fmInitialLipColor = null;
            fmCompletionCount = 0;
            $('aiStatus').textContent = callMode ? '通话中...' : '准备就绪';
        }

        // AI视觉自动检测当前步骤
        async function autoDetectTaskCompletion() {
            if (isDetecting || processing) return;
            if (!currentTasks.length) { stopTaskDetection(); return; }
            const activeStep = currentTasks.findIndex(t => !t.done);
            if (activeStep < 0) { stopTaskDetection(); return; }

            const frameImg = captureFrame(true);
            if (!frameImg || !visionConsentGranted) return;

            isDetecting = true;
            const stepName = currentTasks[activeStep].name;

            // 新策略：让AI先描述看到什么，再判断
            // 不对比前后照，只看当前状态，降低误判
            const promptText = '仔细观察这张照片中的人脸。\n\n' +
                '当前美妆步骤是「' + stepName + '」。\n\n' +
                '请你严格判断：这个人的脸上是否已经明显完成了「' + stepName + '」？\n\n' +
                '判断规则（必须严格遵守）：\n' +
                '- 如果是"洁面"类步骤：脸上看起来干净无妆，回答COMPLETE\n' +
                '- 如果是"涂口红/唇膏"：嘴唇必须有明显的口红颜色（红色/粉色等），回答COMPLETE\n' +
                '- 如果是"画眉"：眉毛必须看起来被描画过，形状分明，回答COMPLETE\n' +
                '- 如果是"涂粉底/底妆"：肤色必须看起来均匀无瑕，回答COMPLETE\n' +
                '- 如果是"眼影/眼妆"：眼皮上必须有明显彩妆颜色，回答COMPLETE\n' +
                '- 如果是"腮红"：脸颊必须有明显红润色彩，回答COMPLETE\n' +
                '- 如果看不到对应变化，或者不确定，回答INCOMPLETE\n\n' +
                '注意：宁可判断为INCOMPLETE也不要误判为COMPLETE！\n' +
                '只回答COMPLETE或INCOMPLETE。';

            const judgeMessages = [
                { role: 'user', content: promptText }
            ];

            try {
                // 用低温度(0.1)让模型更严谨
                const result = await callNativeAI(judgeMessages, [frameImg], 0.1);
                const answer = result.trim().toUpperCase();

                if (answer.includes('COMPLETE') && !answer.includes('INCOMPLETE')) {
                    consecutiveYesCount++;
                    $('aiStatus').textContent = 'AI检测中(' + consecutiveYesCount + '/' + REQUIRED_YES_COUNT + ')';
                    if (consecutiveYesCount >= REQUIRED_YES_COUNT) {
                        markStepDone(activeStep);
                    }
                } else {
                    consecutiveYesCount = 0;
                    $('aiStatus').textContent = 'AI视觉检测中...';
                }
            } catch(e) {
                // 检测失败静默跳过
            } finally {
                isDetecting = false;
            }
        }

        // =====================================================
        // Apple Vision 原生人脸检测（优先）
        // 通过 Swift 桥接调用 Vision Framework 的 VNDetectFaceLandmarksRequest
        // 获取嘴唇、眉毛等面部特征点，用于化妆检测
        // =====================================================
        let nativeFaceAvailable = !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.detectFace);
        let nativeFaceTimer = null;
        let nativeFaceProcessing = false;

        function startNativeFaceDetection() {
            if (nativeFaceTimer || !nativeFaceAvailable) return;
            nativeFaceTimer = setInterval(() => {
                if (nativeFaceProcessing) return;
                const img = captureFrame(false); // 320x240 low-res for speed
                if (!img) return;
                nativeFaceProcessing = true;
                window.webkit.messageHandlers.detectFace.postMessage({image: img});
                // Safety: reset processing flag after 2s in case callback never fires
                setTimeout(() => { nativeFaceProcessing = false; }, 2000);
            }, 200); // ~5fps
        }

        function stopNativeFaceDetection() {
            if (nativeFaceTimer) {
                clearInterval(nativeFaceTimer);
                nativeFaceTimer = null;
            }
            nativeFaceProcessing = false;
        }

        // Swift 回调：接收原生人脸特征点
        window.nativeFaceLandmarks = function(data) {
            nativeFaceProcessing = false;

            // 视障辅助：摄像头空间引导（即使 data=null 没人脸也要触发提示）
            maybeSpeakFaceGuidance(data);

            if (!data) return;
            // 至少需要嘴唇数据或脸框数据
            if (!data.lipTop && !data.faceBox) return;

            // 清除旧画面，更新 canvas 尺寸
            if (fmCtx && fmCanvas) {
                const container = fmCanvas.parentElement;
                if (container) {
                    fmCanvas.width = container.clientWidth;
                    fmCanvas.height = container.clientHeight;
                }
                fmCtx.clearRect(0, 0, fmCanvas.width, fmCanvas.height);
            }
            // 同时清除通话界面 canvas
            if (callMode) {
                const callCanvas = $('callFaceCanvas');
                if (callCanvas) {
                    const cCtx = callCanvas.getContext('2d');
                    cCtx.clearRect(0, 0, callCanvas.width, callCanvas.height);
                }
            }

            // 构建兼容 MediaPipe 格式的 landmarks 数组
            const landmarks = [];
            if (data.lipTop) landmarks[13] = data.lipTop;       // 上唇中心
            if (data.lipBottom) landmarks[14] = data.lipBottom;  // 下唇中心
            if (data.lipLeft) landmarks[61] = data.lipLeft;      // 左嘴角
            if (data.lipRight) landmarks[291] = data.lipRight;   // 右嘴角
            // 保存额外的原生检测数据（眉毛、脸框）
            landmarks._native = data;

            // 根据当前任务类型画对应检测区域框
            if (currentTasks.length > 0 && (fmInitializing || fmInitialLipColor)) {
                drawDetectionRegion(landmarks);
            }

            // 进行化妆检测
            if (currentTasks.length > 0 && (fmInitializing || fmInitialLipColor)) {
                detectWithFaceMesh(landmarks);
            }

            // 实时"画偏"检测（任何时候都跑，不需要任务上下文）
            detectLipOutOfBounds(landmarks);

            fmPrevLandmarks = landmarks;
        };

        // ===== 实时检测口红是否画到唇线外 =====
        let _lipWarnCooldown = 0;       // 上次提醒时间，限流 8 秒一次
        let _lipHintTimer = null;       // 红圈视觉提示自动清除定时器

        function detectLipOutOfBounds(landmarks) {
            const native = landmarks._native;
            if (!native || !native.lipOutline || native.lipOutline.length < 6) return;
            const video = $('camera');
            if (!video || video.readyState < 2) return;

            // 视频帧取色
            const tc = document.createElement('canvas');
            tc.width = video.videoWidth || 640;
            tc.height = video.videoHeight || 480;
            const tctx = tc.getContext('2d');
            tctx.drawImage(video, 0, 0, tc.width, tc.height);
            const imgData = tctx.getImageData(0, 0, tc.width, tc.height);

            const outline = native.lipOutline;
            // 唇形多边形中心 — 用于决定"向外"的方向
            let cx = 0, cy = 0;
            for (const p of outline) { cx += p.x; cy += p.y; }
            cx /= outline.length; cy /= outline.length;

            // 在每个轮廓点的"外侧"采样（沿背离中心方向偏移 1.2%）
            const hits = [];  // 检测到的"画到外面"的位置
            for (let i = 0; i < outline.length; i++) {
                const p = outline[i];
                const dx = p.x - cx;
                const dy = p.y - cy;
                const len = Math.sqrt(dx*dx + dy*dy);
                if (len < 0.001) continue;
                const off = 0.012;
                const sx = p.x + (dx / len) * off;
                const sy = p.y + (dy / len) * off;
                const px = Math.round(sx * tc.width);
                const py = Math.round(sy * tc.height);
                if (px < 1 || px >= tc.width - 1 || py < 1 || py >= tc.height - 1) continue;

                // 3×3 平均
                let r = 0, g = 0, b = 0, cnt = 0;
                for (let dy2 = -1; dy2 <= 1; dy2++) {
                    for (let dx2 = -1; dx2 <= 1; dx2++) {
                        const idx = ((py + dy2) * tc.width + (px + dx2)) * 4;
                        r += imgData.data[idx];
                        g += imgData.data[idx + 1];
                        b += imgData.data[idx + 2];
                        cnt++;
                    }
                }
                r /= cnt; g /= cnt; b /= cnt;

                // 红色度：红色明显高于绿蓝
                const redness = r - (g + b) / 2;
                // 偏红 + 亮度足够 = 可能是涂到了外面的口红色
                if (redness > 28 && r > 130) {
                    hits.push({ p, px, py });
                }
            }

            // 至少 3 个"外侧"点检测到口红色 → 算画偏了
            if (hits.length < 3) return;

            const now = Date.now();
            if (now - _lipWarnCooldown < 8000) {
                // 还在限流期，只更新视觉提示，不再 TTS
                drawLipOutOfBoundsHint(hits);
                return;
            }
            _lipWarnCooldown = now;

            // 判断偏到了哪个方向
            const avgX = hits.reduce((s, h) => s + h.p.x, 0) / hits.length;
            const avgY = hits.reduce((s, h) => s + h.p.y, 0) / hits.length;
            const lipCenterX = cx, lipCenterY = cy;
            let where = '';
            if (avgX < lipCenterX - 0.01) where = '左边';
            else if (avgX > lipCenterX + 0.01) where = '右边';
            if (avgY < lipCenterY - 0.01) where = (where ? where + '上方' : '上唇');
            else if (avgY > lipCenterY + 0.01) where = (where ? where + '下方' : '下唇');
            if (!where) where = '唇线';

            console.log('[画偏检测] hits:', hits.length, 'where:', where);

            // 视觉 + 语音双通道反馈
            drawLipOutOfBoundsHint(hits);
            const msg = `诶，${where}好像画到嘴唇外面了一点点哦~`;
            if (typeof speak === 'function') speak(msg);
            showCallSubtitle && callMode && showCallSubtitle(msg, 'ai');
        }

        function drawLipOutOfBoundsHint(hits) {
            // 在主 canvas 和通话 canvas 上画红色虚线小圈，2 秒后自动清
            const canvases = [];
            if (fmCanvas) canvases.push(fmCanvas);
            if (callMode) {
                const cc = $('callFaceCanvas');
                if (cc) canvases.push(cc);
            }
            for (const cv of canvases) {
                const ctx = cv.getContext('2d');
                const w = cv.width, h = cv.height;
                ctx.save();
                ctx.strokeStyle = 'rgba(220, 38, 38, 0.92)';
                ctx.fillStyle = 'rgba(220, 38, 38, 0.15)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4, 3]);
                for (const hit of hits) {
                    const px = hit.p.x * w;
                    const py = hit.p.y * h;
                    ctx.beginPath();
                    ctx.arc(px, py, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.setLineDash([]);
                ctx.restore();
            }
            // 2 秒后自动清（让正常 detection 接管）
            if (_lipHintTimer) clearTimeout(_lipHintTimer);
            _lipHintTimer = setTimeout(() => {
                // detectionRegion 会在下一帧自己 clear 重画，所以这里不主动 clear
            }, 2000);
        }

        // =====================================================
        // 人脸网格检测（MediaPipe Face Mesh，参考 test8.html）
        // 实时468点人脸地标 → 精确定位嘴唇区域 → 颜色采样
        // 检测手部运动 + 颜色变化 → 自动判断化妆步骤完成
        // =====================================================
        let faceMesh = null;
        let faceMeshReady = false;
        let fmCanvas = null;
        let fmCtx = null;
        let fmPrevLandmarks = null;
        let fmInitialLipColor = null;
        let fmColorSamples = [];
        let fmColorHistory = [];
        let fmMovementHistory = [];
        let fmCompletionCount = 0;
        let fmProcessing = false;
        let fmDetectionTimer = null;
        let fmInitializing = false;

        async function initFaceMesh() {
            // Apple Vision 原生检测可用时，跳过 MediaPipe 加载
            if (nativeFaceAvailable) {
                // 仍需初始化 canvas 用于画检测区域框
                fmCanvas = $('faceCanvas');
                if (fmCanvas) {
                    fmCtx = fmCanvas.getContext('2d');
                }
                $('aiStatus').textContent = '原生人脸检测就绪';
                return true;
            }

            if (typeof FaceMesh === 'undefined') {
                // 脚本还没加载完，等一下再试
                setTimeout(() => {
                    if (typeof FaceMesh !== 'undefined') {
                        initFaceMesh();
                    }
                }, 2000);
                return false;
            }

            try {
                $('aiStatus').textContent = '加载人脸检测...';

                faceMesh = new FaceMesh({
                    locateFile: (file) => {
                        return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + file;
                    }
                });

                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                faceMesh.onResults(onFaceMeshResults);

                fmCanvas = $('faceCanvas');
                if (fmCanvas) {
                    fmCtx = fmCanvas.getContext('2d');
                }

                // 预热：发送一帧让模型完成加载
                const video = $('camera');
                if (video && video.readyState >= 2) {
                    await faceMesh.send({image: video});
                }

                faceMeshReady = true;
                $('aiStatus').textContent = '人脸检测就绪';
                return true;
            } catch (e) {
                $('aiStatus').textContent = '准备就绪';
                return false;
            }
        }

        function startFaceMeshLoop() {
            if (fmDetectionTimer || !faceMeshReady) return;

            fmDetectionTimer = setInterval(async () => {
                if (fmProcessing || !faceMeshReady) return;
                const video = $('camera');
                if (!video || video.readyState < 2) return;

                fmProcessing = true;
                try {
                    await faceMesh.send({image: video});
                } catch (e) {}
                fmProcessing = false;
            }, 200); // ~5fps，平衡性能和响应速度
        }

        function stopFaceMeshLoop() {
            if (fmDetectionTimer) {
                clearInterval(fmDetectionTimer);
                fmDetectionTimer = null;
            }
            fmProcessing = false;
            // 清除 canvas
            if (fmCtx && fmCanvas) {
                fmCtx.clearRect(0, 0, fmCanvas.width, fmCanvas.height);
            }
            // 清除通话界面 canvas
            const callCanvas = $('callFaceCanvas');
            if (callCanvas) {
                const cCtx = callCanvas.getContext('2d');
                cCtx.clearRect(0, 0, callCanvas.width, callCanvas.height);
            }
        }

        function onFaceMeshResults(results) {
            // 更新 canvas 尺寸
            if (fmCtx && fmCanvas) {
                const container = fmCanvas.parentElement;
                if (container) {
                    fmCanvas.width = container.clientWidth;
                    fmCanvas.height = container.clientHeight;
                }
                fmCtx.clearRect(0, 0, fmCanvas.width, fmCanvas.height);
            }

            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                fmPrevLandmarks = null;
                return;
            }

            const landmarks = results.multiFaceLandmarks[0];

            // 画检测区域框（只在有任务检测时显示）
            if (currentTasks.length > 0 && (fmInitializing || fmInitialLipColor)) {
                drawDetectionRegion(landmarks);
            }

            // 进行化妆检测
            if (currentTasks.length > 0 && (fmInitializing || fmInitialLipColor)) {
                detectWithFaceMesh(landmarks);
            }

            fmPrevLandmarks = landmarks;
        }

        // 根据任务类型获取检测区域坐标（归一化坐标）
        function getDetectionBounds(landmarks) {
            const activeStep = currentTasks.findIndex(t => !t.done);
            if (activeStep < 0) return null;
            const taskType = getTaskDetectionType(currentTasks[activeStep].name);
            const native = landmarks._native;

            if (taskType === 'lip') {
                const lipTop = landmarks[13], lipBottom = landmarks[14];
                const lipLeft = landmarks[61], lipRight = landmarks[291];
                if (!lipTop || !lipBottom || !lipLeft || !lipRight) return null;
                return { x1: lipLeft.x, y1: lipTop.y, x2: lipRight.x, y2: lipBottom.y, type: 'lip' };
            }
            if (taskType === 'eyebrow' && native) {
                const lb = native.leftEyebrow, rb = native.rightEyebrow;
                if (lb && rb) {
                    return { x1: Math.min(lb.x, rb.x), y1: Math.min(lb.y, rb.y), x2: Math.max(lb.x + lb.w, rb.x + rb.w), y2: Math.max(lb.y + lb.h, rb.y + rb.h), type: 'eyebrow' };
                }
            }
            if (taskType === 'eye' && native) {
                // 眼部区域：用眉毛下方到嘴唇上方，脸框左右范围
                const lb = native.leftEyebrow, rb = native.rightEyebrow, fb = native.faceBox;
                if (lb && rb && fb) {
                    return { x1: fb.x + fb.w * 0.1, y1: Math.min(lb.y, rb.y), x2: fb.x + fb.w * 0.9, y2: Math.max(lb.y + lb.h, rb.y + rb.h) + 0.06, type: 'eye' };
                }
            }
            if (taskType === 'cheek' && native && native.faceBox) {
                const fb = native.faceBox;
                const lipTop = landmarks[13];
                // 脸颊：脸框左右两侧，嘴唇上方到脸框中部
                return { x1: fb.x + fb.w * 0.05, y1: fb.y + fb.h * 0.35, x2: fb.x + fb.w * 0.95, y2: lipTop ? lipTop.y : fb.y + fb.h * 0.75, type: 'cheek' };
            }
            // face / general：使用整个脸框
            if (native && native.faceBox) {
                const fb = native.faceBox;
                return { x1: fb.x, y1: fb.y, x2: fb.x + fb.w, y2: fb.y + fb.h, type: 'face' };
            }
            // 回退到嘴唇区域
            const lipTop = landmarks[13], lipBottom = landmarks[14];
            const lipLeft = landmarks[61], lipRight = landmarks[291];
            if (lipTop && lipBottom && lipLeft && lipRight) {
                return { x1: lipLeft.x, y1: lipTop.y, x2: lipRight.x, y2: lipBottom.y, type: 'lip' };
            }
            return null;
        }

        // 画检测区域的虚线框（根据任务类型动态调整）
        function drawDetectionRegion(landmarks) {
            if (!fmCtx || !fmCanvas) return;

            const bounds = getDetectionBounds(landmarks);
            if (!bounds) return;

            // 在主 canvas 上画
            _drawRegionOnCtx(fmCtx, fmCanvas, bounds);

            // 通话模式：同时在通话界面 canvas 上画
            if (callMode) {
                const callCanvas = $('callFaceCanvas');
                if (callCanvas) {
                    const callCtx = callCanvas.getContext('2d');
                    const container = callCanvas.parentElement;
                    if (container) {
                        callCanvas.width = container.clientWidth;
                        callCanvas.height = container.clientHeight;
                    }
                    callCtx.clearRect(0, 0, callCanvas.width, callCanvas.height);
                    _drawRegionOnCtx(callCtx, callCanvas, bounds);
                }
            }
        }

        function _drawRegionOnCtx(ctx, canvas, bounds) {
            const w = canvas.width;
            const h = canvas.height;

            const x1 = bounds.x1 * w;
            const x2 = bounds.x2 * w;
            const y1 = bounds.y1 * h;
            const y2 = bounds.y2 * h;
            const pad = 10;

            ctx.save();
            ctx.strokeStyle = 'rgba(249, 115, 22, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.strokeRect(x1 - pad, y1 - pad, (x2 - x1) + pad * 2, (y2 - y1) + pad * 2);
            ctx.setLineDash([]);

            // 标签
            const label = getDetectionLabel(bounds.type);
            ctx.fillStyle = 'rgba(249, 115, 22, 0.9)';
            ctx.font = 'bold 11px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, (x1 + x2) / 2, y1 - pad - 4);
            ctx.restore();
        }

        // 从视频帧采样检测区域颜色（根据任务类型动态调整区域）
        function sampleFmLipColor(landmarks) {
            const video = $('camera');
            if (!video || video.readyState < 2) return null;

            const tc = document.createElement('canvas');
            tc.width = video.videoWidth || 640;
            tc.height = video.videoHeight || 480;
            const tctx = tc.getContext('2d');
            tctx.drawImage(video, 0, 0, tc.width, tc.height);
            const imgData = tctx.getImageData(0, 0, tc.width, tc.height);

            // 获取检测区域坐标
            const bounds = getDetectionBounds(landmarks);
            if (!bounds) return null;

            const m = 0.015;
            const x1 = Math.max(0, Math.floor((bounds.x1 - m) * tc.width));
            const x2 = Math.min(tc.width, Math.floor((bounds.x2 + m) * tc.width));
            const y1 = Math.max(0, Math.floor((bounds.y1 - m) * tc.height));
            const y2 = Math.min(tc.height, Math.floor((bounds.y2 + m) * tc.height));

            let r = 0, g = 0, b = 0, cnt = 0;
            // 大区域用更大的采样步长
            const step = (bounds.type === 'face' || bounds.type === 'cheek') ? 4 : 2;
            for (let y = y1; y < y2; y += step) {
                for (let x = x1; x < x2; x += step) {
                    const idx = (y * tc.width + x) * 4;
                    if (idx >= 0 && idx + 2 < imgData.data.length) {
                        r += imgData.data[idx];
                        g += imgData.data[idx + 1];
                        b += imgData.data[idx + 2];
                        cnt++;
                    }
                }
            }

            if (cnt === 0) return null;

            const ar = r / cnt, ag = g / cnt, ab = b / cnt;
            const mx = Math.max(ar, ag, ab), mn = Math.min(ar, ag, ab);
            return {
                r: ar, g: ag, b: ab,
                saturation: mx === 0 ? 0 : ((mx - mn) / mx) * 100
            };
        }

        // 检测区域颜色变化（根据任务类型使用不同阈值）
        function fmDetectColorChange(cur, init) {
            if (!cur || !init) return false;

            const rDiff = cur.r - init.r;
            const gDiff = cur.g - init.g;
            const bDiff = cur.b - init.b;
            const total = Math.abs(rDiff) + Math.abs(gDiff) + Math.abs(bDiff);
            const satDiff = cur.saturation - init.saturation;

            // 获取当前任务类型
            const activeStep = currentTasks.findIndex(t => !t.done);
            const taskType = activeStep >= 0 ? getTaskDetectionType(currentTasks[activeStep].name) : 'lip';

            if (taskType === 'lip') {
                // 口红检测：红/粉色系变化（阈值提高，避免光线误判）
                if (rDiff > 20 && rDiff > Math.abs(gDiff) && rDiff > Math.abs(bDiff)) return true;
                if (satDiff > 15) return true;
                if (rDiff > 15 && satDiff > 8) return true;
                if (total > 40) return true;
                if (init.saturation < 25 && satDiff > 8 && rDiff > 15) return true;
            } else if (taskType === 'eyebrow') {
                // 画眉：颜色变深（亮度降低）
                const briDiff = (rDiff + gDiff + bDiff) / 3;
                if (briDiff < -15) return true;
                if (total > 35) return true;
            } else if (taskType === 'eye') {
                // 眼影/眼妆：颜色变化明显
                if (total > 30) return true;
                if (Math.abs(satDiff) > 12) return true;
            } else if (taskType === 'cheek') {
                // 腮红：红色通道增加 + 饱和度增加
                if (rDiff > 12 && satDiff > 6) return true;
                if (total > 30) return true;
            } else {
                // face / general：整体色调变化（粉底使肤色均匀）
                if (total > 25) return true;
                if (Math.abs(satDiff) > 10) return true;
                // 肤色均匀度提升（方差减小 → 用总变化替代）
                const briDiff = (rDiff + gDiff + bDiff) / 3;
                if (Math.abs(briDiff) > 15) return true;
            }

            return false;
        }

        // 检测面部附近的运动（手在涂抹）
        function fmDetectMovement(lm, prev) {
            if (!prev) return false;
            // 用嘴唇关键点作为运动参考（适用于所有任务类型，因为手遮脸时会影响这些点）
            const pts = [13, 14, 61, 291];
            let mc = 0;
            for (const i of pts) {
                if (lm[i] && prev[i] && (Math.abs(lm[i].x - prev[i].x) > 0.02 || Math.abs(lm[i].y - prev[i].y) > 0.02)) mc++;
            }
            return mc >= 2;
        }

        // Face Mesh 实时化妆检测
        function detectWithFaceMesh(landmarks) {
            const activeStep = currentTasks.findIndex(t => !t.done);
            if (activeStep < 0) return;

            const color = sampleFmLipColor(landmarks);
            if (!color) return;

            // 阶段一：收集初始颜色（5帧取平均）
            if (fmInitializing) {
                fmColorSamples.push(color);
                $('aiStatus').textContent = '采集基准颜色(' + fmColorSamples.length + '/8)...';
                if (callMode) updateCallOverlayStatus('采集基准颜色(' + fmColorSamples.length + '/8)...');
                if (fmColorSamples.length >= 8) {
                    fmInitialLipColor = {
                        r: fmColorSamples.reduce((s, c) => s + c.r, 0) / fmColorSamples.length,
                        g: fmColorSamples.reduce((s, c) => s + c.g, 0) / fmColorSamples.length,
                        b: fmColorSamples.reduce((s, c) => s + c.b, 0) / fmColorSamples.length,
                        saturation: fmColorSamples.reduce((s, c) => s + c.saturation, 0) / fmColorSamples.length
                    };
                    fmInitializing = false;
                    fmColorSamples = [];
                    $('aiStatus').textContent = 'AI实时检测中...';
                    if (callMode) {
                        const _stepName = currentTasks[activeStep] ? currentTasks[activeStep].name : '';
                        updateCallOverlayStatus(_stepName ? '准备检测「' + _stepName + '」...' : 'AI实时检测中...');
                    }
                }
                return;
            }

            if (!fmInitialLipColor) return;

            // 阶段二：持续检测颜色变化 + 手部运动
            const hasMovement = fmDetectMovement(landmarks, fmPrevLandmarks);
            fmMovementHistory.push(hasMovement);
            if (fmMovementHistory.length > 15) fmMovementHistory.shift();

            fmColorHistory.push(color);
            if (fmColorHistory.length > 10) fmColorHistory.shift();

            // 平均最近5帧颜色（平滑处理减少误判）
            const recent = fmColorHistory.slice(-5);
            if (recent.length < 3) return;
            const avgColor = {
                r: recent.reduce((s, c) => s + c.r, 0) / recent.length,
                g: recent.reduce((s, c) => s + c.g, 0) / recent.length,
                b: recent.reduce((s, c) => s + c.b, 0) / recent.length,
                saturation: recent.reduce((s, c) => s + c.saturation, 0) / recent.length
            };

            const changed = fmDetectColorChange(avgColor, fmInitialLipColor);
            const noMovement = !fmMovementHistory.slice(-5).some(m => m);

            if (changed && noMovement) {
                fmCompletionCount++;
                var pct = Math.min(Math.round(fmCompletionCount / 15 * 100), 100);
                $('aiStatus').textContent = '检测到变化 ' + pct + '%';
                if (callMode) {
                    const _stepName = currentTasks[activeStep] ? currentTasks[activeStep].name : '';
                    updateCallOverlayStatus(_stepName ? '「' + _stepName + '」完成度 ' + pct + '%' : '检测到变化 ' + pct + '%');
                }

                if (fmCompletionCount >= 15) {
                    markStepDone(activeStep);
                    resetFmForNextStep();
                }
            } else if (changed && hasMovement) {
                // 正在涂抹中，显示进度
                const _stepName = currentTasks[activeStep] ? currentTasks[activeStep].name : '';
                $('aiStatus').textContent = _stepName ? '正在涂抹「' + _stepName + '」...' : '正在涂抹中...';
                if (callMode) updateCallOverlayStatus($('aiStatus').textContent);
                fmCompletionCount = Math.max(0, fmCompletionCount - 0.5);
            } else if (hasMovement) {
                fmCompletionCount = Math.max(0, fmCompletionCount - 1);
            }

            // 🔍 画偏检测（只在口红任务时跑）
            const taskType = getTaskDetectionType(currentTasks[activeStep].name);
            if (taskType === 'lip') {
                const detection = detectLipOutOfBounds(landmarks);
                _maybeWarnLipOutOfBounds(detection);
            }
        }

        // ===== 视障辅助：摄像头空间引导 =====
        // 检测人脸位置/距离，用语音引导盲人对准摄像头
        const FACE_GUIDE_THROTTLE_MS    = 5000;   // 同一种提示 5 秒内不重复
        const FACE_GUIDE_NO_FACE_WAIT   = 2000;   // 没人脸防抖：2 秒后才报
        const FACE_GUIDE_REPEAT_MS      = 9000;   // 同一状态超过 9 秒再念一次

        let _faceGuideEnabled = true;             // 总开关（以后可在设置里关）
        let _faceGuideLastState = null;
        let _faceGuideLastSpokenAt = 0;
        let _faceGuideNoFaceSince = null;

        // 评估当前人脸位置 → 返回 {state, msg}
        function _evaluateFacePosition(data) {
            if (!data || !data.faceBox) {
                return { state: 'no_face', msg: '没看到你的脸，请把手机对准面前' };
            }
            const fb = data.faceBox;
            const cx = fb.x + fb.w / 2;
            const cy = fb.y + fb.h / 2;

            // 距离判断（按脸宽占比，前置摄像头一般 0.35-0.55 算正常）
            if (fb.w < 0.22) return { state: 'too_far',   msg: '把手机往脸近一点，再近一点' };
            if (fb.w > 0.75) return { state: 'too_close', msg: '手机离脸远一点点' };

            // 中心位置（容差 ±15%）
            if (cx < 0.30) return { state: 'too_left',  msg: '脸往右移一些，或者手机往左挪一点' };
            if (cx > 0.70) return { state: 'too_right', msg: '脸往左移一些，或者手机往右挪一点' };
            if (cy < 0.25) return { state: 'too_high',  msg: '手机往上抬一点点' };
            if (cy > 0.75) return { state: 'too_low',   msg: '手机往下降一点点' };

            return { state: 'good', msg: '位置好了，可以开始啦' };
        }

        function maybeSpeakFaceGuidance(data) {
            if (!_faceGuideEnabled) return;
            // 只在有化妆任务（化妆指导场景）时引导；纯聊天不强求脸正对
            if (!currentTasks || currentTasks.length === 0) return;
            // 涂抹完一步后等下一步还是要引导，但已经全部完成就别再说话
            if (currentTasks.every(t => t.done)) return;

            const ev = _evaluateFacePosition(data);
            const now = Date.now();

            // 没人脸防抖：第一次出现给 2 秒缓冲
            if (ev.state === 'no_face') {
                if (!_faceGuideNoFaceSince) _faceGuideNoFaceSince = now;
                if (now - _faceGuideNoFaceSince < FACE_GUIDE_NO_FACE_WAIT) return;
            } else {
                _faceGuideNoFaceSince = null;
            }

            // 状态变好 → 念一句"好了"
            if (ev.state === 'good') {
                if (_faceGuideLastState && _faceGuideLastState !== 'good') {
                    if (now - _faceGuideLastSpokenAt > 1500) {
                        if (typeof speak === 'function') speak(ev.msg);
                        _faceGuideLastSpokenAt = now;
                    }
                }
                _faceGuideLastState = 'good';
                return;
            }

            // 状态变化（坏状态切换） → 立刻说
            if (ev.state !== _faceGuideLastState) {
                if (now - _faceGuideLastSpokenAt < FACE_GUIDE_THROTTLE_MS) return;
                _faceGuideLastState = ev.state;
                _faceGuideLastSpokenAt = now;
                if (typeof speak === 'function') speak(ev.msg);
                _showFaceGuideText(ev.msg, ev.state);
                return;
            }

            // 状态持续过久 → 隔 9 秒重念一次
            if (now - _faceGuideLastSpokenAt > FACE_GUIDE_REPEAT_MS) {
                _faceGuideLastSpokenAt = now;
                if (typeof speak === 'function') speak(ev.msg);
            }
        }

        // 状态文字也显示在状态条上（低视力用户能看见）
        function _showFaceGuideText(msg, state) {
            const el = $('aiStatus');
            if (!el) return;
            el.textContent = msg;
            if (callMode) updateCallOverlayStatus(msg);
        }


        // ===== 画偏检测：判断"颜色超出唇线" =====

        let _lipOffWarningHistory = [];
        let _lipOffLastWarnAt = 0;
        const LIP_OFF_THROTTLE_MS = 8000;     // 8 秒内最多一次 TTS 提示
        const LIP_OFF_OUTLINE_OFFSET = 0.008; // 唇线外偏移量（归一化坐标，相对图像）
        const LIP_OFF_MIN_HITS = 2;            // 平均出界点数 ≥ 2 才警告

        function detectLipOutOfBounds(landmarks) {
            const outline = landmarks._native && landmarks._native.lipOutline;
            if (!outline || outline.length < 6) return null;
            if (!fmInitialLipColor) return null;

            const video = $('camera');
            if (!video || video.readyState < 2) return null;

            const tc = document.createElement('canvas');
            tc.width = video.videoWidth || 640;
            tc.height = video.videoHeight || 480;
            const tctx = tc.getContext('2d');
            tctx.drawImage(video, 0, 0, tc.width, tc.height);
            const imgData = tctx.getImageData(0, 0, tc.width, tc.height).data;

            // 唇形中心
            let cx = 0, cy = 0;
            for (const p of outline) { cx += p.x; cy += p.y; }
            cx /= outline.length; cy /= outline.length;

            const detected = [];
            const initSat = fmInitialLipColor.saturation;

            for (const p of outline) {
                // 从唇中心 → 这个轮廓点的方向，再外推 LIP_OFF_OUTLINE_OFFSET
                const dx = p.x - cx;
                const dy = p.y - cy;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len < 0.001) continue;
                const outerX = p.x + (dx / len) * LIP_OFF_OUTLINE_OFFSET;
                const outerY = p.y + (dy / len) * LIP_OFF_OUTLINE_OFFSET;

                const px = Math.floor(outerX * tc.width);
                const py = Math.floor(outerY * tc.height);
                if (px < 1 || py < 1 || px >= tc.width - 1 || py >= tc.height - 1) continue;

                // 3x3 邻域取均色，减少单像素噪声
                let sr = 0, sg = 0, sb = 0, cnt = 0;
                for (let dy2 = -1; dy2 <= 1; dy2++) {
                    for (let dx2 = -1; dx2 <= 1; dx2++) {
                        const idx = ((py + dy2) * tc.width + (px + dx2)) * 4;
                        sr += imgData[idx]; sg += imgData[idx + 1]; sb += imgData[idx + 2];
                        cnt++;
                    }
                }
                const r = sr / cnt, g = sg / cnt, b = sb / cnt;
                const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
                const sat = mx === 0 ? 0 : (mx - mn) / mx;

                // 判断：饱和度比基线高显著 + 红色主导 = "口红颜色越界了"
                const isLipstickLike = (sat > initSat + 0.15) && (r > g + 8) && (r > b);
                if (isLipstickLike) detected.push({ x: outerX, y: outerY });
            }

            return { hits: detected.length, total: outline.length, detected: detected };
        }

        function _maybeWarnLipOutOfBounds(detection) {
            if (!detection) return;

            _lipOffWarningHistory.push(detection.hits);
            if (_lipOffWarningHistory.length > 5) _lipOffWarningHistory.shift();

            // 在两个 canvas 上画红色出界圈（即时反馈，不节流）
            _drawLipOffMarkers(detection);

            // TTS 节流：最近 5 帧平均 ≥ MIN_HITS 且距上次 ≥ 8s 才说话
            const avg = _lipOffWarningHistory.reduce((a, b) => a + b, 0) / _lipOffWarningHistory.length;
            if (avg < LIP_OFF_MIN_HITS) return;

            const now = Date.now();
            if (now - _lipOffLastWarnAt < LIP_OFF_THROTTLE_MS) return;
            _lipOffLastWarnAt = now;

            const msgs = [
                '诶~好像画到嘴唇外面一点点啦',
                '哎呀，有点画偏了哦',
                '嘴唇线那边稍微出去了一些',
                '小心点，画到唇线外面了',
                '哎，颜色超出唇线了',
            ];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            if (typeof speak === 'function') speak(msg);
        }

        function _drawLipOffMarkers(detection) {
            if (!detection || detection.detected.length === 0) return;
            const canvases = [fmCanvas];
            if (callMode) {
                const cc = $('callFaceCanvas');
                if (cc) canvases.push(cc);
            }
            for (const canvas of canvases) {
                if (!canvas) continue;
                const ctx = canvas.getContext('2d');
                ctx.save();
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.95)'; // 红
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4, 3]);
                for (const p of detection.detected) {
                    const x = p.x * canvas.width;
                    const y = p.y * canvas.height;
                    ctx.beginPath();
                    ctx.arc(x, y, 7, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function resetFmForNextStep() {
            fmCompletionCount = 0;
            fmInitialLipColor = null;
            fmColorSamples = [];
            fmColorHistory = [];
            fmMovementHistory = [];
            var activeStep = currentTasks.findIndex(t => !t.done);
            if (activeStep >= 0) {
                fmInitializing = true;
            }
        }

        async function callAPI(text, img) {
            const wantsVision = needsImageAnalysis(text);
            // 通话模式下跳过图片分析，始终用快速流式文字API
            const canUseVision = !callMode && wantsVision && img && ensureVisionConsent();

            // 构建消息列表：通话模式少发历史，加速响应
            const historyLimit = callMode ? 4 : 10;
            const recentHistory = history.slice(-historyLimit);
            const messages = recentHistory.map(h => ({
                role: h.role,
                content: h.content
            }));

            // 如果用户问附近店铺，把店铺信息注入上下文让 AI 回答
            const input = text.toLowerCase();
            if (input.includes('附近') || input.includes('店铺') || input.includes('店') ||
                input.includes('哪里买') || input.includes('购买') || input.includes('在哪')) {
                const storeInfo = getNearbyStoresDescription();
                messages.push({
                    role: 'user',
                    content: text + '\n\n[系统补充 - 以下是用户附近的化妆品店铺信息，请基于这些信息回答]\n' + storeInfo
                });
            } else if (canUseVision) {
                // 需要图片分析时，在提示中说明附带了照片
                messages.push({
                    role: 'user',
                    content: text + '\n\n[用户已通过摄像头拍摄了面部照片，请结合照片仔细分析皮肤状态]'
                });
                $('aiStatus').textContent = '拍照分析中...';
                if (callMode) updateCallOverlayStatus('拍照分析中...');
            } else {
                // 注入当前任务进度上下文
                const taskCtx = getTaskContextText();
                let callModeHint = '';
                if (callMode) {
                    if (isTutorialRequest(text) && currentTasks.length === 0) {
                        // 教程请求：不限制字数，让AI输出完整任务清单
                        callModeHint = '\n[通话模式：用户请求教程指导，请务必按 [CHECKLIST] 格式输出任务清单，不要省略]';
                    } else {
                        callModeHint = '\n[通话模式：请用1-2句话简短回答，不超过50字]';
                    }
                }
                messages.push({ role: 'user', content: text + taskCtx + callModeHint });
            }

            // 只在需要图片分析且有图片时发送图片
            const sendImage = canUseVision ? img : null;
            const reply = await callNativeAI(messages, sendImage, undefined, callMode);
            return reply;
        }

        // 处理输入
        async function handleInput(text) {
            if (processing) {
                return;
            }

            // 语音关键词检测：用户说"完成了"等，直接标记当前步骤
            if (currentTasks.length > 0 && isCompletionPhrase(text)) {
                const activeStep = currentTasks.findIndex(t => !t.done);
                if (activeStep >= 0) {
                    addMessage(text, true);
                    history.push({ role: 'user', content: text });
                    markStepDone(activeStep);
                    return; // 不需要调 AI，直接完成
                }
            }

            processing = true;
            addMessage(text, true);
            history.push({ role: 'user', content: text });

            // 通话模式走 /api/chat + 流式 TTS
            if (callMode) {
                $('aiStatus').textContent = '小美思考中...';
                updateCallOverlayStatus('小美思考中...');
            }

            // 普通模式使用 HTTP API
            const img = captureFrame();
            showTyping();
            $('aiStatus').textContent = callMode ? '小美思考中...' : '思考中...';
            if (callMode) {
                updateCallOverlayStatus('小美思考中...');
            }

            try {
                const rawReply = await callAPI(text, img);
                hideTyping();
                // 处理任务标记（解析清单、完成标记等）
                const reply = processTaskMarkers(rawReply);
                if (reply) {
                    if (_streamingDiv) {
                        // 流式已经显示了文字，用处理后的版本替换
                        _streamingDiv.textContent = reply;
                        _streamingDiv = null;
                        _streamingCallId = null;
                    } else {
                        addMessage(reply);
                    }
                    if (_streamingSpoke) {
                        // 通话模式下已经逐句播报过了，只需刷入剩余缓冲
                        _flushStreamBuffer();
                        _streamingSpoke = false;
                    } else {
                        speak(reply);
                    }
                } else if (_streamingDiv) {
                    // 回复被全部处理掉了（如纯任务标记），移除流式div
                    _streamingDiv.remove();
                    _streamingDiv = null;
                    _streamingCallId = null;
                }
                history.push({ role: 'assistant', content: rawReply });
            } catch (e) {
                hideTyping();
                _clearStreamQueue(); // 出错时清除流式播报队列
                if (_streamingDiv) {
                    _streamingDiv.remove();
                    _streamingDiv = null;
                    _streamingCallId = null;
                }
                const errMsg = e.message || '出错了，请重试';
                addMessage(errMsg);
                speak('抱歉，出现了问题');
            } finally {
                // 确保 processing 一定会被重置，解决加载卡住问题
                processing = false;
                $('aiStatus').textContent = callMode ? '通话中...' : '准备就绪';
                if (callMode) {
                    updateCallOverlayStatus((speaking || _streamTTSActive) ? '小美正在说...' : '正在听你说...');
                }
                // 通话模式下：如果TTS正在说/即将说，不要立刻启动识别
                // 让 nativeTTSEnded 来负责重启识别，避免回声打断TTS
                if (callMode && !listening && !speaking && !_streamTTSActive) {
                    setTimeout(() => {
                        if (callMode && !listening && !processing && !speaking && !_streamTTSActive) {
                            startCallModeRecognition();
                        }
                    }, 300);
                }
            }
        }

        // =====================================================
        // 事件绑定
        // =====================================================


        $('voiceBtn').onclick = () => {
            toggleCallMode();
        };


        // Web Speech API 回退（浏览器调试用）
        let webRecognition = null;
        function fallbackWebSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                addMessage('当前环境不支持语音输入，请使用文字输入', false);
                return;
            }

            if (!webRecognition) {
                webRecognition = new SR();
                webRecognition.lang = 'zh-CN';
                webRecognition.continuous = false;
                webRecognition.interimResults = false;

                webRecognition.onstart = () => window.nativeSpeechStarted();
                webRecognition.onresult = (e) => {
                    const text = e.results[0][0].transcript;
                    window.nativeSpeechResult(text);
                };
                webRecognition.onend = () => window.nativeSpeechEnded();
                webRecognition.onerror = (e) => window.nativeSpeechError(e.error === 'no-speech' ? '没有检测到语音，请再试一次' : '语音识别出错');
            }

            if (listening) {
                webRecognition.stop();
            } else {
                try {
                    webRecognition.start();
                } catch (e) {
                    resetVoiceUI();
                }
            }
        }

        $('speakerBtn').onclick = () => {
            voiceEnabled = !voiceEnabled;
            $('spkOn').classList.toggle('hidden', !voiceEnabled);
            $('spkOff').classList.toggle('hidden', voiceEnabled);
            if (!voiceEnabled) {
                stopSpeak();
            } else {
                speak('语音已开启');
            }
        };

        $('sendBtn').onclick = () => {
            const text = $('input').value.trim();
            if (text) {
                handleInput(text);
                $('input').value = '';
            }
        };

        $('input').onkeypress = e => {
            if (e.key === 'Enter') {
                const text = $('input').value.trim();
                if (text) {
                    handleInput(text);
                    $('input').value = '';
                }
            }
        };

        document.querySelectorAll('.quick-btn').forEach(b => {
            b.onclick = () => handleInput(b.dataset.text);
        });

        // 自动重置卡住的 processing 状态（安全网：8秒超时）
        setInterval(() => {
            if (processing && !$('typing')) {
                processing = false;
                $('aiStatus').textContent = callMode ? '通话中...' : '准备就绪';
            }
            // 通话模式安全网：确保识别始终在运行（即使 TTS 播放中也需要识别，用于打断检测）
            if (callMode && !listening && !processing) {
                startCallModeRecognition();
            }
        }, 8000);

        // 初始化（延迟启动摄像头，确保 WKWebView 委托已就绪）
        setTimeout(() => initCamera(), 500);

        // 请求定位（原生桥接）
        setTimeout(() => {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.requestLocation) {
                window.webkit.messageHandlers.requestLocation.postMessage({});
            }
            // 检查 API Key 状态
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.getAPIKey) {
                window.webkit.messageHandlers.getAPIKey.postMessage({});
            }
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.getZhipuKey) {
                window.webkit.messageHandlers.getZhipuKey.postMessage({});
            }
        }, 1000);

    </script>
</body>
